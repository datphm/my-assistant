<!doctype html>
<html lang="vi"><head><base target="_top"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"><?!= include('Styles'); ?></head>
<body><main class="shell"><header><div class="brand"><span class="logo"><svg viewBox="0 0 64 64" aria-hidden="true"><path d="M12 12h40v30c0 6-5 10-10 10H28L17 60v-8c-3-2-5-6-5-10z"/><path class="check" d="m23 31 6 6 13-14"/><circle cx="48" cy="14" r="4"/></svg></span><div><h1>My Assistant</h1><p>Việc ít hơn. Đúng lúc hơn.</p></div></div><button class="quiet" onclick="enableEmails()">Bật email nhắc</button></header>
<section id="summary" class="summary"></section>
<nav><button class="active" data-page="today">Hôm nay</button><button data-page="money">Tiền</button><button data-page="food">Ăn uống</button><button data-page="travel">Chuyến đi</button></nav>
<section id="today" class="page active"><div class="section-head"><h2>Việc kế tiếp</h2><button onclick="openForm('task')">+ Thêm việc</button></div><div id="tasks" class="cards"></div></section>
<section id="money" class="page"><div class="section-head"><h2>Tiền & nợ</h2><button onclick="openForm('debt')">+ Thêm nợ</button></div><div id="moneySummary" class="metric"></div><h3>Chi tiêu từ Gmail</h3><p class="hint">Chỉ quét email ngân hàng theo truy vấn bạn tự chọn. App không đọc thông báo iPhone.</p><div class="inline"><input id="gmailQuery" placeholder="from:alerts@yourbank.com newer_than:30d"><button onclick="importExpenses()">Nhập giao dịch</button></div><div id="debts" class="cards"></div></section>
<section id="food" class="page"><div class="section-head"><h2>Thực đơn</h2><button onclick="openForm('meal')">+ Lưu món</button></div><div id="meals" class="cards"></div></section>
<section id="travel" class="page"><div class="section-head"><h2>Chuyến đi</h2><button onclick="openForm('flight')">+ Thêm chuyến bay</button></div><div id="flights" class="cards"></div></section>
</main><dialog id="formDialog"><form method="dialog" onsubmit="saveForm(event)"><div class="dialog-head"><h2 id="formTitle"></h2><button type="button" class="close" onclick="formDialog.close()">×</button></div><div id="formFields"></div><button class="save" value="default">Lưu</button></form></dialog><div id="toast"></div><?!= include('Script'); ?></body></html>
