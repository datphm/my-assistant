name: Deploy My Assistant

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Apps Script CLI
        run: npm install --global @google/clasp
      - name: Restore Google authorization
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "Missing GitHub secret: CLASPRC_JSON"
            exit 1
          fi
          printf '%s\n' "$CLASPRC_JSON" > ~/.clasprc.json
          node -e "JSON.parse(require('fs').readFileSync(process.env.HOME + '/.clasprc.json', 'utf8'))"
      - name: Set target Apps Script project
        env:
          SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: |
          if [ -z "$SCRIPT_ID" ]; then
            echo "Missing GitHub secret: APPS_SCRIPT_ID"
            exit 1
          fi
          node -e "require('fs').writeFileSync('.clasp.json', JSON.stringify({ scriptId: process.env.SCRIPT_ID, rootDir: '.' }))"
      - name: Push source and update Web App
        run: |
          # Canonical deployment used by the user's saved URL.
          # Never let an old repository secret silently redirect deployment.
          DEPLOYMENT_ID="AKfycbzbU9s1CSHeRPmjRMSUTrCXw_gA6_l9JX3RbGvTMdT1Cfzx0UDZ0eU0-rTEAWoa8WVJSA"
          clasp push --force
          clasp deploy --deploymentId "$DEPLOYMENT_ID" --description "GitHub automatic update $GITHUB_SHA"
          echo "Current deployments:"
          clasp deployments
