name: Deploy My Assistant

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Apps Script CLI
        run: npm install --global @google/clasp
      - name: Restore Google authorization
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json
      - name: Set target Apps Script project
        env:
          SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: printf '{"scriptId":"%s","rootDir":"."}' "$SCRIPT_ID" > .clasp.json
      - name: Push source and update Web App
        env:
          DEPLOYMENT_ID: ${{ secrets.APPS_SCRIPT_DEPLOYMENT_ID }}
        run: |
          clasp push --force
          clasp deploy --deploymentId "$DEPLOYMENT_ID" --description "GitHub automatic update $GITHUB_SHA"
