<script>
let data={tasks:[],tasksteps:[],taskupdates:[],debts:[],meals:[],healthprofile:[],weightlogs:[],healthlogs:[],flights:[],hotels:[],appointments:[],expenses:[],wallets:[],allocations:[],cvs:[],reflectionprofile:[],studyabroadprofile:[],studyabroadoptions:[],studyabroadchecklist:[],appsettings:[],dailyguidance:{},profile:[],timelogs:[],timestate:[],routinesettings:[],plans:[],notifications:[]};
let currentType='', editingId='', moneyPeriod='month', flightLimit=20;
let viewingCvId='';
let initialPageApplied=false;
let fullDataLoaded=false,todayLoading=false,fullLoading=false,formSaving=false;
const pendingActions=new Set();
const defaultKanbanFold={overdue:false,upcoming:false,done:true};
let kanbanCollapsed=(()=>{try{return Object.assign({},defaultKanbanFold,JSON.parse(localStorage.getItem('my-assistant-kanban-fold-v1')||'{}'))}catch(e){return Object.assign({},defaultKanbanFold)}})();
const kanbanScrollPositions={};
let assistantBrief=null,assistantBriefLoading=false;
let assistantMode=localStorage.getItem('my-assistant-mode-v1')||'focus';
let activeTimeLog=JSON.parse(localStorage.getItem('my-assistant-active-time-v1')||'null');
let taskFoldState=(()=>{try{return JSON.parse(localStorage.getItem('my-assistant-task-fold-v1')||'{}')}catch(e){return {}}})();
let uiFoldState=(()=>{try{return JSON.parse(localStorage.getItem('my-assistant-ui-fold-v1')||'{}')}catch(e){return {}}})();
let tickerHidden=localStorage.getItem('my-assistant-ticker-hidden-v1')==='yes';
let tickerCustomMessage=localStorage.getItem('my-assistant-ticker-message-v1')||'';
let miniCalendarCursor=new Date(new Date().getFullYear(),new Date().getMonth(),1);
let flightBoardPages=[],flightBoardPage=0,assistantGateIndex=0;
let profilePrivacyHidden=localStorage.getItem('my-assistant-profile-private-v1')!=='no';
const $=id=>document.getElementById(id);
const vnd=n=>new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND',maximumFractionDigits:0}).format(Number(n||0));
const num=n=>new Intl.NumberFormat('vi-VN').format(Number(n||0));
const colors=['#203a66','#245647','#87aa99','#e5b44f','#e55d6f','#5795d0'];
const periodLabels={week:'tuần này',month:'tháng này',year:'năm nay',twoYears:'2 năm gần đây'};

function applyServerData(d){data=Object.assign(data,d);applyAppSettings();const serverActive=(data.timestate||[])[0];activeTimeLog=serverActive?{kind:serverActive.kind,label:serverActive.label,startAt:serverActive.startAt}:null;if(activeTimeLog)localStorage.setItem('my-assistant-active-time-v1',JSON.stringify(activeTimeLog));else localStorage.removeItem('my-assistant-active-time-v1')}
function load(){const page=document.querySelector('.page.active')?.id||'today';if(page==='today'||!fullDataLoaded)refreshToday();else refreshFullData(page)}
function refreshToday(silent=false){if(todayLoading)return;todayLoading=true;if(!silent)document.body.classList.add('today-loading');google.script.run.withSuccessHandler(d=>{todayLoading=false;document.body.classList.remove('today-loading');applyServerData(d);render();if(!assistantBrief&&!assistantBriefLoading)loadAssistantBrief();if(!initialPageApplied){initialPageApplied=true;activatePage(location.hash.replace('#','')||appSettings().startupPage||'assistant')}}).withFailureHandler(e=>{todayLoading=false;document.body.classList.remove('today-loading');fail(e)}).getTodayData()}
function refreshFullData(){if(fullLoading)return;fullLoading=true;document.body.classList.add('full-loading');google.script.run.withSuccessHandler(d=>{fullLoading=false;fullDataLoaded=true;document.body.classList.remove('full-loading');applyServerData(d);render()}).withFailureHandler(e=>{fullLoading=false;document.body.classList.remove('full-loading');fail(e)}).getData()}
function appSettings(){return (data.appsettings||[])[0]||{timezone:'Asia/Ho_Chi_Minh',locale:'vi-VN',startupPage:'assistant',theme:'pastel',fontScale:'100',reducedMotion:'no',compactMode:'no',hideFinancialAmounts:'no',defaultTaskMinutes:15,defaultChaseMode:'normal',confirmBeforeDelete:'yes'}}
function applyAppSettings(){const s=appSettings(),systemDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;document.documentElement.dataset.theme=s.theme==='system'?(systemDark?'dark':'light'):(s.theme||'dark');document.documentElement.style.fontSize=`${Number(s.fontScale||100)}%`;document.body.classList.toggle('reduce-motion',s.reducedMotion==='yes');document.body.classList.toggle('compact-ui',s.compactMode==='yes');document.body.classList.toggle('hide-finance',s.hideFinancialAmounts==='yes')}
function rememberUiFold(key,details){uiFoldState[key]=details.open;localStorage.setItem('my-assistant-ui-fold-v1',JSON.stringify(uiFoldState))}
function restoreUiFolds(){document.querySelectorAll('details[data-ui-fold]').forEach(details=>{details.open=uiFoldState[details.dataset.uiFold]===true})}
function render(){
  const open=data.tasks.filter(t=>!truth(t.done)&&t.status!=='done').sort((a,b)=>new Date(a.dueAt)-new Date(b.dueAt));
  $('summary').innerHTML=`<small>HÔM NAY</small><b>${open.length?open.length+' việc đang mở':'Không còn việc mở'}</b><span>${open.length?'Chọn một việc nhỏ và bắt đầu.':'Bạn có thể nghỉ một chút.'}</span>`;
  $('tasks').innerHTML=open.length?open.slice(0,8).map(t=>taskCard(t)).join(''):'<div class="empty">Chưa có việc nào. Một việc nhỏ là đủ.</div>';
  renderTicker();
  renderLivePulse(open);
  renderTodayCoach(open);
  renderAssistantBrief();
  renderKanban();
  renderNotifications();
  renderTimeAnchor();
  renderCurrentPage();
}
function renderCurrentPage(){
  const page=document.querySelector('.page.active')?.id||'today';
  if(page==='assistant')renderAssistantBrief();
  if(page==='profile')renderProfile();
  if(page==='money')renderMoney();
  if(page==='cv')renderCvs();
  if(page==='study')renderStudyAbroad();
  if(page==='food')renderHealth();
  if(page==='travel')renderTravel();
  if(page==='time')renderTime();
  if(page==='install')renderInstall();
}
function renderTicker(){
  const shell=$('reminderTicker'),track=$('tickerTrack'),toggle=$('tickerToggle');if(!shell||!track||!toggle)return;
  shell.classList.toggle('ticker-hidden',tickerHidden);toggle.textContent=tickerHidden?'Hiện bảng tin':'Ẩn';if(tickerHidden)return;
  const now=Date.now(),open=data.tasks.filter(t=>!truth(t.done)&&t.status!=='done'),overdue=open.filter(t=>t.dueAt&&new Date(t.dueAt)<now),next=open.filter(t=>t.dueAt).sort((a,b)=>new Date(a.dueAt)-new Date(b.dueAt))[0],notices=(data.notifications||[]).filter(n=>!n.readAt).slice(-3).reverse();
  const messages=[];if(tickerCustomMessage)messages.push(tickerCustomMessage);if(activeTimeLog)messages.push(`Đang tập trung: ${activeTimeLog.label}`);if(overdue.length)messages.push(`${overdue.length} việc đã quá hạn — chọn một bước nhỏ và xử lý ngay`);if(next)messages.push(`Kế tiếp: ${next.title} · ${dateTime(next.dueAt)}`);notices.forEach(n=>messages.push(`${n.title}: ${n.message||''}`));if(!messages.length)messages.push('Không có cảnh báo gấp · hãy chọn một đầu ra quan trọng nhất cho hôm nay');
  const line=messages.map(esc).join('<span aria-hidden="true">◆</span>');track.innerHTML=`<span>${line}</span><span aria-hidden="true">${line}</span>`;
}
function toggleTickerVisibility(){tickerHidden=!tickerHidden;localStorage.setItem('my-assistant-ticker-hidden-v1',tickerHidden?'yes':'no');renderTicker()}
function editTickerMessage(){const value=prompt('Thông điệp riêng muốn ghim lên bảng tin (để trống để xoá):',tickerCustomMessage);if(value===null)return;tickerCustomMessage=value.trim().slice(0,220);if(tickerCustomMessage)localStorage.setItem('my-assistant-ticker-message-v1',tickerCustomMessage);else localStorage.removeItem('my-assistant-ticker-message-v1');renderTicker();toast(tickerCustomMessage?'Đã ghim thông điệp lên bảng tin':'Đã bỏ thông điệp riêng')}
function renderLivePulse(open){
  const box=$('livePulse');if(!box)return;const now=Date.now(),overdue=open.filter(t=>t.dueAt&&new Date(t.dueAt)<now).length,follow=open.filter(t=>t.followUpAt&&new Date(t.followUpAt)<=now).length,unread=(data.notifications||[]).filter(n=>!n.readAt).length,totalBalance=(data.wallets||[]).reduce((s,w)=>s+Number(w.balance||0),0);
  const balanceLabel=appSettings().hideFinancialAmounts==='yes'?'••••':fullDataLoaded?vnd(totalBalance):'Mở tab Tiền';box.innerHTML=`<button onclick="activatePage('today')"><small>VIỆC MỞ</small><b>${open.length}</b></button><button class="${overdue?'attention':''}" onclick="activatePage('today')"><small>QUÁ HẠN</small><b>${overdue}</b></button><button onclick="activatePage('today')"><small>FOLLOW-UP</small><b>${follow}</b></button><button onclick="activatePage('time')"><small>ĐANG LOG</small><b>${activeTimeLog?esc(activeTimeLog.label):'Chưa bật'}</b></button><button onclick="activatePage('money')"><small>SỐ DƯ</small><b>${balanceLabel}</b></button><button onclick="activatePage('today')"><small>THÔNG BÁO</small><b>${unread}</b></button>`;
}
function taskCard(t){
  const steps=taskSteps(t.id),doneSteps=steps.filter(s=>truth(s.done)).length,next=steps.find(s=>!truth(s.done)),updates=taskUpdates(t.id),progress=steps.length?Math.round(doneSteps/steps.length*100):0;
  const collapsed=taskFoldState[t.id]!==false;
  const checklist=`<details class="task-checklist-panel"><summary><span>Checklist · ${doneSteps}/${steps.length} bước</span><b>Mở / ẩn</b></summary><div class="task-checklist">${steps.map(s=>`<label class="${truth(s.done)?'completed':''}"><button onclick="toggleTaskStepUi('${s.id}')" aria-label="Đổi trạng thái">${truth(s.done)?'✓':'○'}</button><span>${esc(s.title)}</span><button class="step-edit" onclick="editTaskStepUi('${s.id}')" aria-label="Sửa bước">✎</button><button class="step-delete" onclick="removeItem('TaskSteps','${s.id}')" aria-label="Xoá bước">×</button></label>`).join('')||'<p class="meta">Chưa có checklist. Bạn có thể thêm bước hoặc tạo checklist mẫu.</p>'}</div></details>`;
  return `<article class="card task-workspace ${t.chaseMode==='urgent'?'chasing':''}" id="task-${escAttr(t.id)}"><div class="card-top"><div><div class="task-badges"><span class="status-badge ${t.priority==='high'?'danger':t.status==='waiting'?'warning':'ok'}">${esc(taskStatusLabel(t))}</span>${t.waitingFor?`<span class="pill">CHỜ ${esc(t.waitingFor)}</span>`:''}</div><h3>${t.chaseMode==='urgent'?'🚨 ':''}${esc(t.title)}</h3><p class="meta">${dateTime(t.dueAt)} · ${t.minutes||10} phút · ${esc(t.area||'Cá nhân')}${t.followUpAt?' · follow-up '+dateTime(t.followUpAt):''}</p></div><button class="done" onclick="complete('${t.id}')" aria-label="Hoàn thành">✓</button></div><details class="task-body" ${collapsed?'':'open'} ontoggle="rememberTaskFold('${t.id}',this)"><summary><span class="task-fold-label"></span><b>${steps.length?`${doneSteps}/${steps.length} bước · ${progress}%`:'Chưa có checklist'}</b></summary><div class="task-details"><div class="task-next"><small>BƯỚC DUY NHẤT LÚC NÀY</small><b>${esc(next?.title||t.nextAction||'Chọn một bước nhỏ trong 5–10 phút')}</b>${t.outcome?`<span>Đầu ra: ${esc(t.outcome)}</span>`:''}</div>${steps.length?`<div class="task-progress"><i><em style="width:${progress}%"></em></i><b>${doneSteps}/${steps.length} bước · ${progress}%</b></div>`:''}${checklist}<div class="task-actions-primary"><button onclick="focusTask('${t.id}')">▶ Focus 10 phút</button><button class="outline" onclick="openTaskUpdate('${t.id}')">↻ Cập nhật / follow-up</button></div><details class="task-more"><summary>Thêm bước · sửa · Calendar · xoá</summary><div class="task-actions-secondary"><button onclick="addTaskStepUi('${t.id}')">+ Bước</button>${steps.length?'':`<button onclick="generateChecklistUi('${t.id}')">Checklist mẫu</button>`}<button onclick="editItem('task','${t.id}')">Sửa</button><button onclick="syncCalendar('${t.id}')">Calendar</button><button class="${t.chaseMode==='urgent'?'danger':''}" onclick="toggleChase('${t.id}')">${t.chaseMode==='urgent'?'Tắt bám':'Bám đuổi'}</button><button class="danger" onclick="removeItem('Tasks','${t.id}')">Xoá</button></div></details>${updates.length?`<details class="task-updates"><summary>${updates.length} cập nhật gần đây</summary>${updates.slice(0,3).map(u=>`<p><b>${dateTime(u.createdAt)}</b><span>${esc(u.note)}</span></p>`).join('')}</details>`:''}</div></details></article>`;
}
function rememberTaskFold(id,details){taskFoldState[id]=!details.open;localStorage.setItem('my-assistant-task-fold-v1',JSON.stringify(taskFoldState))}
function setAllTaskFolds(collapsed){data.tasks.filter(t=>!truth(t.done)&&t.status!=='done').forEach(t=>taskFoldState[t.id]=collapsed);localStorage.setItem('my-assistant-task-fold-v1',JSON.stringify(taskFoldState));render();toast(collapsed?'Đã thu gọn các việc':'Đã mở chi tiết các việc')}
function taskSteps(taskId){return (data.tasksteps||[]).filter(s=>s.taskId===taskId).sort((a,b)=>Number(a.position||0)-Number(b.position||0))}
function taskUpdates(taskId){return (data.taskupdates||[]).filter(u=>u.taskId===taskId).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))}
function taskStatusLabel(t){return t.status==='waiting'?'Đang chờ follow-up':t.status==='blocked'?'Đang kẹt':t.status==='doing'?'Đang làm':t.priority==='high'?'Ưu tiên cao':'Cần làm'}
function taskAttentionScore(t,now=Date.now()){
  const due=t.dueAt?new Date(t.dueAt)-now:null,follow=t.followUpAt&&new Date(t.followUpAt)<=now;
  return (t.status==='doing'?1000:0)+(t.status==='blocked'?650:0)+(t.priority==='high'?500:0)+(follow?400:0)+(due===null?0:due<=0?450:Math.max(0,300-due/3600000))+(assistantMode==='low'&&t.energy==='low'?380:0)+(assistantMode==='overwhelmed'&&Number(t.minutes||15)<=10?420:0);
}
function assistantTopTask(){
  return data.tasks.filter(t=>!truth(t.done)&&t.status!=='done').sort((a,b)=>taskAttentionScore(b)-taskAttentionScore(a))[0]||null;
}
function renderTodayCoach(open){
  const box=$('todayCoach');if(!box)return;const now=Date.now(),planned=open.reduce((s,t)=>s+Number(t.minutes||15),0),followups=open.filter(t=>t.followUpAt&&new Date(t.followUpAt)<=now),stale=open.filter(t=>t.startedAt&&now-new Date(t.lastProgressAt||t.startedAt)>2*3600000);
  renderTodayLaunchPad(open);
  const focus=assistantTopTask(),next=focus&&taskSteps(focus.id).find(s=>!truth(s.done)),session=assistantMode==='overwhelmed'?5:assistantMode==='low'?10:15;
  box.innerHTML=`<article class="card adhd-command"><div class="command-metrics"><span><small>KẾ HOẠCH HÔM NAY</small><b>${planned} phút</b></span><span><small>FOLLOW-UP ĐẾN HẠN</small><b>${followups.length}</b></span><span><small>ĐANG LÀM > 2H CHƯA UPDATE</small><b>${stale.length}</b></span></div>${focus?`<div class="command-focus"><span>CHỈ NHÌN VIỆC NÀY · CHẾ ĐỘ ${assistantMode==='overwhelmed'?'GIẢI CỨU':assistantMode==='low'?'ÍT NĂNG LƯỢNG':'TẬP TRUNG'}</span><h2>${esc(focus.title)}</h2><p>${esc(next?.title||focus.nextAction||'Mở tài liệu và làm bước đầu trong 5 phút.')}</p><div><button onclick="focusTask('${focus.id}')">Bắt đầu ${session} phút</button><button class="outline" onclick="document.getElementById('task-${escAttr(focus.id)}')?.scrollIntoView({behavior:'smooth'})">Mở checklist</button></div></div>`:'<div class="command-focus"><h2>Không có việc đang mở</h2><p>Ghi việc mới ngay khi nhận để não không phải giữ trong đầu.</p></div>'}${planned>360?'<div class="capacity-warning">Danh sách đang vượt 6 giờ tập trung. Hãy dời hoặc xoá ít nhất một việc; lịch quá tải không phải là kế hoạch.</div>':''}</article>`;
}
function renderTodayLaunchPad(open){
  const box=$('todayLaunchPad');if(!box)return;const now=new Date(),start=new Date(now);start.setHours(0,0,0,0);const end=new Date(start);end.setDate(end.getDate()+1);
  const overdue=open.filter(t=>t.dueAt&&new Date(t.dueAt)<now),today=open.filter(t=>t.dueAt&&new Date(t.dueAt)>=start&&new Date(t.dueAt)<end),quick=open.filter(t=>Number(t.minutes||15)<=15),follow=open.filter(t=>t.followUpAt&&new Date(t.followUpAt)<=now),done=(data.tasks||[]).filter(t=>(truth(t.done)||t.status==='done')&&t.updatedAt&&localDateKey(t.updatedAt)===localDateKey(now));
  const planned=today.length||Math.min(3,open.length),progress=planned+done.length?Math.round(done.length/(planned+done.length)*100):0;
  const lane=(icon,label,items,empty,kind)=>`<button class="today-lane ${items.length?'has-items':''}" onclick="focusTodayLane('${kind}')"><span>${icon}</span><div><small>${esc(label)}</small><b>${items.length||0}</b><em>${esc(items[0]?.title||empty)}</em></div><i>→</i></button>`;
  box.innerHTML=`<article class="today-launch"><div class="today-launch-head"><div><span class="section-kicker">DAILY LAUNCHPAD</span><h2>${overdue.length?'Đóng một vòng lặp đang trễ':'Giữ ngày hôm nay đủ nhỏ để hoàn thành'}</h2><p>${done.length?`Đã khép ${done.length} việc · tiếp tục một bước, không mở thêm năm hướng.`:'Chọn một việc có đầu ra rõ và bắt đầu trong 5–15 phút.'}</p></div><div class="today-score"><b>${progress}%</b><span>nhịp hoàn thành</span></div></div><div class="today-lanes">${lane('!','QUÁ HẠN',overdue,'Không có việc trễ','overdue')}${lane('⚡','LÀM NHANH ≤15P',quick,'Chưa có quick win','quick')}${lane('↻','FOLLOW-UP',follow,'Không có việc phải đuổi','follow')}</div></article>`;
}
function focusTodayLane(kind){const now=Date.now(),open=(data.tasks||[]).filter(t=>!truth(t.done)&&t.status!=='done');let rows=kind==='overdue'?open.filter(t=>t.dueAt&&new Date(t.dueAt)<now):kind==='quick'?open.filter(t=>Number(t.minutes||15)<=15):open.filter(t=>t.followUpAt&&new Date(t.followUpAt)<=now);rows=rows.sort((a,b)=>taskAttentionScore(b)-taskAttentionScore(a));if(!rows.length){toast(kind==='quick'?'Chưa có việc nhanh. Hãy giảm một việc xuống bước 10 phút.':'Không có việc trong nhóm này.');return}openOperationTask(rows[0].id)}
function loadAssistantBrief(force=false){
  if(assistantBriefLoading)return;assistantBriefLoading=true;renderAssistantBrief();
  google.script.run.withSuccessHandler(brief=>{assistantBriefLoading=false;assistantBrief=brief;renderAssistantBrief()}).withFailureHandler(e=>{assistantBriefLoading=false;renderAssistantBrief();fail(e)}).getAssistantBrief(force);
}
function refreshOperationCenter(){assistantBrief=null;loadAssistantBrief(true);refreshFullData()}
function setAssistantMode(mode){assistantMode=mode;localStorage.setItem('my-assistant-mode-v1',mode);renderTodayCoach(data.tasks.filter(t=>!truth(t.done)&&t.status!=='done'));renderAssistantBrief()}
function assistantMoney(value){return appSettings().hideFinancialAmounts==='yes'?'••••':vnd(value)}
function assistantCheckKey(){return `my-assistant-day-check-v1:${localDateKey(new Date())}`}
function assistantChecks(){try{return JSON.parse(localStorage.getItem(assistantCheckKey())||'{}')}catch(e){return {}}}
function toggleAssistantCheck(id,checked){const state=assistantChecks();state[id]=checked;localStorage.setItem(assistantCheckKey(),JSON.stringify(state));renderAssistantBrief()}
function assistantNowTask(){
  if(activeTimeLog){const running=data.tasks.find(task=>!truth(task.done)&&task.status!=='done'&&task.title===activeTimeLog.label);if(running)return running}
  return assistantTopTask();
}
function assistantQuickFocus(){const task=assistantNowTask();if(task)focusTask(task.id);else openForm('task')}
function openAssistantNowTask(id){
  taskFoldState[id]=false;localStorage.setItem('my-assistant-task-fold-v1',JSON.stringify(taskFoldState));activatePage('today');
  setTimeout(()=>{render();$(`task-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'})},80);
}
function rescueMe(){
  assistantMode='overwhelmed';localStorage.setItem('my-assistant-mode-v1','overwhelmed');const task=assistantTopTask();
  if(!task){activatePage('today');openForm('task');return}
  taskFoldState[task.id]=false;localStorage.setItem('my-assistant-task-fold-v1',JSON.stringify(taskFoldState));
  activatePage('today');render();setTimeout(()=>$(`task-${task.id}`)?.scrollIntoView({behavior:'smooth',block:'center'}),80);toast('Chế độ Cứu tôi: chỉ làm một bước trong 5 phút.');
}
function assistantQuickBlocked(id){
  const task=data.tasks.find(item=>item.id===id);if(!task)return;
  openForm('taskUpdate',{taskId:id,status:'blocked',note:'Tôi đang kẹt vì: ',nextFollowUpAt:task.followUpAt||''});
}
function assistantDayEvents(){
  const start=new Date();start.setHours(0,0,0,0);const end=new Date(start);end.setDate(end.getDate()+1);
  const rows=[];
  (data.tasks||[]).filter(task=>!truth(task.done)&&task.status!=='done'&&task.dueAt).forEach(task=>{const at=new Date(task.dueAt);if(at>=start&&at<end)rows.push({at,icon:'✓',label:task.title,page:'today'})});
  (data.appointments||[]).filter(item=>item.startAt).forEach(item=>{const at=new Date(item.startAt);if(at>=start&&at<end)rows.push({at,icon:appointmentIcon(item.type),label:item.title||'Cuộc hẹn',page:'time'})});
  (data.flights||[]).filter(item=>item.departure).forEach(item=>{const at=new Date(item.departure);if(at>=start&&at<end)rows.push({at,icon:'✈',label:item.code||'Chuyến bay',page:'travel'})});
  return rows.sort((a,b)=>a.at-b.at).slice(0,5);
}
function assistantMomentum(b){

function renderKanban(){
  document.querySelectorAll('.kanban-list[data-kanban-key]').forEach(list=>kanbanScrollPositions[list.dataset.kanbanKey]=list.scrollTop);
  const now=new Date();
  const open=data.tasks.filter(t=>!truth(t.done)&&t.status!=='done').sort((a,b)=>new Date(a.dueAt)-new Date(b.dueAt));
  const overdue=open.filter(t=>t.dueAt&&new Date(t.dueAt)<=now);
  const upcoming=open.filter(t=>!t.dueAt||new Date(t.dueAt)>now);

  const col=(key,title,items,empty)=>{

    const nearest=items.length?(key==='done'?`${items.length} việc hoàn thành gần đây`:(items[0].dueAt?`Gần nhất: ${dateTime(items[0].dueAt)}`:'Có việc chưa đặt hạn')):empty;
    return `<section class="kanban-col ${folded?'collapsed':''}">

      ${items.length?`<div class="kanban-list" data-kanban-key="${key}" onscroll="rememberKanbanScroll('${key}',this.scrollTop)">${items.map(card).join('')}</div>${folded&&hidden?`<button class="kanban-more" onclick="toggleKanbanColumn('${key}')">+ ${hidden} việc khác · mở để xem</button>`:''}`:`<p class="meta kanban-empty">${empty}</p>`}

function renderFinanceWarnings(totalBalance,totalDebt,income,expense,tx){
  const warnings=[],minimum=data.debts.reduce((s,d)=>s+Number(d.minimumPayment||0),0),outflows=tx.filter(e=>e.direction!=='income'),categories={};
  outflows.forEach(e=>{const key=e.category||'Khác';categories[key]=(categories[key]||0)+Number(e.amount||0)});
  const top=Object.entries(categories).sort((a,b)=>b[1]-a[1])[0],months=expense>0?totalBalance/expense:null;
  if(expense>income&&expense>0)warnings.push(['danger','Dòng tiền đang âm',`Chi vượt thu ${vnd(expense-income)} trong ${periodLabels[moneyPeriod]}.`, 'Xem 3 khoản chi lớn nhất và hoãn một khoản không cấp thiết.']);
  if(totalDebt>totalBalance)warnings.push(['danger','Dư nợ cao hơn số dư',`Chênh lệch ${vnd(totalDebt-totalBalance)}.`, 'Ưu tiên đúng hạn các khoản tối thiểu và không tạo thêm nợ nếu chưa có nguồn trả.']);
  if(income>0&&minimum/income>.3)warnings.push(['warning','Áp lực trả nợ đáng chú ý',`Khoản tối thiểu bằng ${Math.round(minimum/income*100)}% tiền vào kỳ này.`, 'Kiểm tra lãi suất, ngày đến hạn và phương án tái cơ cấu với đơn vị cho vay nếu khó trả.']);
  if(months!==null&&months<1)warnings.push(['danger','Khoảng đệm dưới 1 kỳ chi',`Số dư hiện tại tương đương khoảng ${months.toFixed(1)} lần chi của ${periodLabels[moneyPeriod]}.`, 'Tạm giảm cam kết chi lớn và đặt một mức quỹ dự phòng riêng.']);
  else if(months!==null&&months<3)warnings.push(['warning','Khoảng đệm còn mỏng',`Số dư tương đương khoảng ${months.toFixed(1)} lần chi của kỳ đang xem.`, 'Tự đặt mục tiêu quỹ dự phòng phù hợp với tiền thuê nhà, công việc và người phụ thuộc.']);
  if(top&&expense&&top[1]/expense>.4)warnings.push(['info','Chi tập trung ở '+top[0],`${Math.round(top[1]/expense*100)}% tiền ra · ${vnd(top[1])}.`, 'Mở các giao dịch nhóm này và kiểm tra khoản nào có thể cắt hoặc đặt trần.']);
  const stale=data.wallets.filter(w=>w.lastUpdatedAt&&Date.now()-new Date(w.lastUpdatedAt)>30*86400000);
  if(stale.length)warnings.push(['info','Số dư có thể đã cũ',`${stale.length} ví/tài khoản chưa cập nhật hơn 30 ngày.`, 'Cập nhật số dư trước khi dùng insight để quyết định.']);
  if(!warnings.length)warnings.push(['ok','Chưa phát hiện cảnh báo lớn','Dữ liệu kỳ đang xem chưa cho thấy dòng tiền âm hoặc áp lực rõ rệt.','Tiếp tục log giao dịch và cập nhật số dư để insight chính xác hơn.']);
  const personalLine=`Dựa trên ${data.wallets.length} tài khoản, ${data.debts.length} khoản nợ và ${tx.length} giao dịch trong ${periodLabels[moneyPeriod]}.`;
  $('financeWarnings').innerHTML=`<div class="section-head compact"><div><h3>Trợ lý tư vấn tài chính cá nhân</h3><span class="hint">${esc(personalLine)} Khuyến nghị bên dưới được tính riêng từ dòng tiền, số dư, dư nợ và kế hoạch của bạn.</span></div></div>${warnings.map(w=>`<article class="finance-alert ${w[0]}"><div><b>${esc(w[1])}</b><span>${esc(w[2])}</span></div><p><b>Việc nên làm:</b> ${esc(w[3])}</p></article>`).join('')}`;
}

function expensesInPeriod(){
  const start=periodStart(moneyPeriod);
  return data.expenses.filter(e=>e.date&&new Date(e.date)>=start);
}
function periodStart(p){
  const now=new Date(), d=new Date(now);
  if(p==='week'){d.setDate(now.getDate()-((now.getDay()+6)%7));d.setHours(0,0,0,0);return d}
  if(p==='year'){return new Date(now.getFullYear(),0,1)}
  if(p==='twoYears'){return new Date(now.getFullYear()-2,now.getMonth(),now.getDate())}
  return new Date(now.getFullYear(),now.getMonth(),1);
}
function setMoneyPeriod(p){

function renderAllocation(periodTx){

  let entries=Object.entries(grouped); let label='Chi tiêu thực tế '+periodLabels[moneyPeriod];
  if(!entries.length){entries=data.allocations.length?data.allocations.map(a=>[a.name,Number(a.percent)]):[['Thiết yếu',50],['Tiết kiệm / mục tiêu',20],['Nợ',20],['Linh hoạt',10]];label='Tỷ lệ bạn đặt (chưa có giao dịch trong kỳ)'}
  const total=entries.reduce((s,[,n])=>s+n,0)||1;
  let cursor=0; const segments=entries.map(([name,value],i)=>{const start=cursor;const end=cursor+value/total*100;cursor=end;return `${colors[i%colors.length]} ${start}% ${end}%`});

function moneyBucketsForPeriod(){
  const now=new Date(),buckets=[];
  if(moneyPeriod==='week'){const start=periodStart('week');for(let i=0;i<7;i++){const from=new Date(start);from.setDate(start.getDate()+i);const to=new Date(from);to.setDate(from.getDate()+1);buckets.push({label:from.toLocaleDateString('vi-VN',{weekday:'short'}),from,to})}}
  else if(moneyPeriod==='month'){const last=new Date(now.getFullYear(),now.getMonth()+1,1),daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();for(let day=1;day<=daysInMonth;day+=7){const from=new Date(now.getFullYear(),now.getMonth(),day),to=new Date(Math.min(last.getTime(),new Date(now.getFullYear(),now.getMonth(),day+7).getTime()));buckets.push({label:`${day}–${Math.min(day+6,daysInMonth)}`,from,to})}}
  else if(moneyPeriod==='year'){for(let month=0;month<12;month++)buckets.push({label:`T${month+1}`,from:new Date(now.getFullYear(),month,1),to:new Date(now.getFullYear(),month+1,1)})}
  else{const quarter=Math.floor(now.getMonth()/3),first=new Date(now.getFullYear(),quarter*3-21,1);for(let i=0;i<8;i++){const from=new Date(first.getFullYear(),first.getMonth()+i*3,1),to=new Date(first.getFullYear(),first.getMonth()+i*3+3,1);buckets.push({label:`Q${Math.floor(from.getMonth()/3)+1}/${String(from.getFullYear()).slice(-2)}`,from,to})}}
  return buckets;
}
function renderMoneyCharts(tx,totalBalance,totalDebt){
  const flow=$('moneyFlowChart'),balance=$('balanceDebtChart');if(!flow||!balance)return;const buckets=moneyBucketsForPeriod();buckets.forEach(bucket=>{const rows=tx.filter(item=>{const date=new Date(item.date);return date>=bucket.from&&date<bucket.to});bucket.income=rows.filter(item=>item.direction==='income').reduce((s,item)=>s+Number(item.amount||0),0);bucket.expense=rows.filter(item=>item.direction!=='income').reduce((s,item)=>s+Number(item.amount||0),0)});const max=Math.max(1,...buckets.flatMap(b=>[b.income,b.expense]));
  if(!tx.length)flow.innerHTML='<div class="empty-chart">Chưa có giao dịch trong kỳ này.</div>';else flow.innerHTML=`<div class="flow-bars">${buckets.map(bucket=>`<div class="flow-bucket"><div class="flow-values"><i class="income" title="Tiền vào ${vnd(bucket.income)}" style="height:${Math.max(bucket.income?4:0,bucket.income/max*100)}%"></i><i class="expense" title="Tiền ra ${vnd(bucket.expense)}" style="height:${Math.max(bucket.expense?4:0,bucket.expense/max*100)}%"></i></div><span>${esc(bucket.label)}</span></div>`).join('')}</div><div class="chart-legend"><span><i class="income"></i>Tiền vào</span><span><i class="expense"></i>Tiền ra</span></div>`;
  const rows=[...(data.wallets||[]).map(w=>({name:w.name,value:Math.max(0,Number(w.balance||0)),type:'asset'})),...(data.debts||[]).map(d=>({name:d.name,value:Math.max(0,Number(d.balance||0)),type:'debt'}))].sort((a,b)=>b.value-a.value).slice(0,10),rowMax=Math.max(1,...rows.map(row=>row.value));
  balance.innerHTML=rows.length?`<div class="balance-total"><span><small>TỔNG SỐ DƯ</small><b>${vnd(totalBalance)}</b></span><span><small>TỔNG DƯ NỢ</small><b>${vnd(totalDebt)}</b></span></div><div class="balance-rows">${rows.map(row=>`<div class="balance-row"><span>${esc(row.name)}</span><div><i class="${row.type}" style="width:${row.value/rowMax*100}%"></i></div><b>${vnd(row.value)}</b></div>`).join('')}</div>`:'<div class="empty-chart">Thêm tài khoản hoặc khoản nợ để xem biểu đồ.</div>';
}

ctionDetail('Các chỉ số Thần số học',p.numerologyNotes)}</div><blockquote>${esc(g.reflection||'Hôm nay điều gì cần sự ổn định thay vì thêm ý tưởng mới?')}</blockquote><p class="reflection-disclaimer">${esc(g.reflectionDisclaimer||'Nội dung này chỉ để tự suy ngẫm.')}</p></article>`;

function reflectionDetail(title,value){return value?`<details><summary>${esc(title)}</summary><pre>${esc(value)}</pre></details>`:''}

function buildReflectionMomentum(){

function saveManifest(button){
  const goal=$('manifestGoal').value.trim(),evidence=$('manifestEvidence').value.trim();if(!goal){toast('Hãy viết mục tiêu manifest trước.');return}
  button.disabled=true;button.textContent='Đang lưu…';google.script.run.withSuccessHandler(item=>{data.reflectionprofile[0]=Object.assign(data.reflectionprofile[0]||{},item);button.disabled=false;button.textContent='Đã lưu ✓';toast('Đã lưu manifest. Bây giờ làm bằng chứng nhỏ đã ghi.');}).withFailureHandler(e=>{button.disabled=false;button.textContent='Lưu manifest & tạo cam kết';fail(e)}).saveManifest({goal,evidence});
}
function renderStudyAbroad(){

  $('studyFinance').innerHTML=`<div class="study-money"><span><small>Ngân sách dự kiến</small><b>${budget?vnd(budget):'Chưa nhập'}</b></span><span><small>Còn thiếu</small><b>${budget?vnd(gap):'Chưa tính'}</b></span></div><div class="goal-track"><i style="width:${budget?Math.min(100,saved/budget*100):0}%"></i></div><p class="meta">${esc(p.fundingPlan||'Cập nhật nguồn tiền: tiết kiệm, học bổng, gia đình hoặc khoản vay phù hợp.')}</p><p class="hint">Ngân sách nên gồm học phí, sinh hoạt, bảo hiểm, visa, vé máy bay, tiền đặt cọc nhà và quỹ khẩn cấp 3–6 tháng.</p>`;
  $('studyOptions').innerHTML=options.map(o=>`<article class="card study-option"><div class="card-top"><div><span class="pill">${esc(o.country||'CHƯA CHỌN NƯỚC')} · ${esc(o.priority||'match')}</span><h3>${esc(o.school||'Chưa nhập trường')}</h3><p class="meta">${esc(o.program||'Chưa nhập chương trình')} · ${esc(o.degree||p.targetDegree||'')}</p></div><div class="card-actions"><button class="outline small" onclick="editItem('studyOption','${o.id}')">Sửa</button><button class="outline small danger" onclick="removeItem('StudyAbroadOptions','${o.id}')">Xoá</button></div></div><div class="study-option-meta"><span><small>Kỳ học</small><b>${esc(o.intake||'—')}</b></span><span><small>Deadline</small><b>${o.applicationDeadline?dateShort(o.applicationDeadline):'—'}</b></span><span><small>Học phí/năm</small><b>${o.tuitionAnnual?vnd(o.tuitionAnnual):'—'}</b></span><span><small>Sinh hoạt/năm</small><b>${o.livingCostAnnual?vnd(o.livingCostAnnual):'—'}</b></span></div><p class="meta">Ngoại ngữ: ${esc(o.languageRequirement||'chưa cập nhật')} · Học bổng: ${esc(o.scholarship||'chưa cập nhật')}</p>${o.website&&safeUrl(o.website)?`<a class="doc-link" href="${escAttr(o.website)}" target="_blank" rel="noopener">Mở trang chương trình ↗</a>`:''}</article>`).join('')||'<div class="empty">Thêm 6–10 lựa chọn và chia thành nhóm an toàn, phù hợp, tham vọng.</div>';
  $('studyRoadmap').innerHTML=steps.map(s=>`<article class="study-step ${s.status==='done'?'completed':''}"><button class="study-check" onclick="toggleStudyStep('${s.id}')">${s.status==='done'?'✓':'○'}</button><div><span>${esc(s.category||'Hồ sơ')} · ${dateShort(s.dueAt)}</span><b>${esc(s.title)}</b><p>${esc(s.notes||'')}</p></div><div class="card-actions"><button class="outline small" onclick="createStudyReminder('${s.id}')">Nhắc</button><button class="outline small" onclick="editItem('studyChecklist','${s.id}')">Sửa</button><button class="outline small danger" onclick="removeItem('StudyAbroadChecklist','${s.id}')">Xoá</button></div></article>`).join('')||'<div class="empty">Chưa có lộ trình. Thêm bước đầu tiên với một deadline cụ thể.</div>';

function renderStudyLaunchpad(p,options,steps,months,deadlines){
  const box=$('studyLaunchpad');if(!box)return;
  const pending=steps.filter(s=>s.status!=='done').sort((a,b)=>new Date(a.dueAt||'2999-01-01')-new Date(b.dueAt||'2999-01-01'));

  const missionTitle=mission?.title||'Chốt 3 quốc gia và 6 chương trình mục tiêu';
  const missionMeta=mission?`${mission.category||'Hồ sơ'} · hạn ${dateShort(mission.dueAt)}`:(nextSchool?`Hạn trường gần nhất ${dateShort(nextSchool.applicationDeadline)}`:'Bắt đầu bằng một shortlist có deadline');
  const actions=[['🎧','IELTS 25 phút','Làm một phiên IELTS tập trung 25 phút',25],['🔎','Săn 1 học bổng','Tìm và lưu một học bổng toàn phần phù hợp',20],['✍️','Viết 150 từ SOP','Viết 150 từ cho bài luận SOP',25],['📩','Nhắn người giới thiệu','Liên hệ một người có thể viết thư giới thiệu',10]];
  box.innerHTML=`<article class="study-launch-card"><div class="study-launch-copy"><span class="section-kicker">SCHOLARSHIP LAUNCHPAD</span><h2>Đường băng tới ${Number(p.targetIntakeYear||2028)}</h2><p>${esc(countries)} · Mỗi tuần tạo một bằng chứng khiến hồ sơ mạnh hơn.</p><div class="study-destination"><span>VIỆT NAM</span><i></i><b>✈</b><i></i><span>${esc(String(p.targetCountries||'FULL SCHOLARSHIP').split(/[,;\n]/)[0])}</span></div></div><div class="study-countdown"><b>${months}</b><span>tháng để chuẩn bị</span><small>${options.length} chương trình trong radar</small></div><div class="study-week-mission"><span>NHIỆM VỤ TUẦN NÀY</span><h3>${esc(missionTitle)}</h3><p>${esc(missionMeta)}</p>${mission?`<button onclick="createStudyReminder('${mission.id}')">Đưa vào Hôm nay</button>`:`<button onclick="openForm('studyChecklist')">Tạo mốc đầu tiên</button>`}</div><div class="study-sprint-grid">${actions.map(a=>`<button onclick="createStudySprint('${encodeURIComponent(a[2])}',${a[3]},this)"><b>${a[0]}</b><span>${a[1]}</span><small>Bắt đầu nhỏ</small></button>`).join('')}</div></article>`;
}
function createStudySprint(encodedTitle,minutes,button){
  const title=decodeURIComponent(encodedTitle),due=new Date();due.setDate(due.getDate()+1);due.setHours(20,0,0,0);
  if(button){button.disabled=true;button.querySelector('small').textContent='Đang tạo…'}
  google.script.run.withSuccessHandler(()=>{toast('Đã đưa một bước du học nhỏ vào tab Hôm nay.');refreshFullData()}).withFailureHandler(e=>{if(button){button.disabled=false;button.querySelector('small').textContent='Thử lại'}fail(e)}).addItem('Tasks',{title:'Du học · '+title,dueAt:due.toISOString(),status:'todo',priority:'high',minutes:Number(minutes||20),area:'Cá nhân',definitionOfDone:'Đã tạo một đầu ra có thể lưu hoặc kiểm chứng và ghi bước tiếp theo.'});
}
function renderScholarshipCommand(p,options,steps){
  const box=$('studyScholarship');if(!box)return;
  const text=steps.map(s=>(s.title+' '+(s.category||'')).toLowerCase()),current=parseFloat(String(p.currentEnglishScore||'').replace(',','.')),target=parseFloat(String(p.targetEnglishScore||'').replace(',','.'));
  const pillars=[
    ['GPA & học thuật',Boolean(p.currentGpa),'Nhập GPA và thành tích nổi bật'],
    ['Ngoại ngữ',Number.isFinite(current)&&Number.isFinite(target)&&current>=target,`Đạt ${p.englishTest||'IELTS'} ${p.targetEnglishScore||'mục tiêu'}`],
    ['Shortlist 6+ trường',options.length>=6,`${options.length}/6 lựa chọn`],

function fieldHtml(name,label,input,options,value){
  const val=value===undefined||value===null?'':value;
  if(input==='hidden')return `<input type="hidden" name="${name}" value="${escAttr(val)}">`;
  if(input==='select'){return `<div class="field"><label>${label}</label><select name="${name}">${options.split(',').map(o=>`<option value="${escAttr(o)}" ${String(o)===String(val)?'selected':''}>${esc(labelForOption(o))}</option>`).join('')}</select></div>`}
  if(input==='wallet'){return `<div class="field"><label>${label}</label><select name="${name}"><option value="">Chưa chọn</option>${data.wallets.map(w=>`<option value="${escAttr(w.id)}" ${w.id===val?'selected':''}>${esc(w.name)}</option>`).join('')}</select></div>`}
  if(input==='debt'){return `<div class="field"><label>${label}</label><select name="${name}"><option value="">Không liên kết khoản nợ</option>${data.debts.map(d=>`<option value="${escAttr(d.id)}" ${d.id===val?'selected':''}>${esc(d.name)} · ${vnd(d.balance)}</option>`).join('')}</select></div>`}
  if(input==='textarea')return `<div class="field"><label>${label}</label><textarea name="${name}">${esc(val)}</textarea></div>`;
  if(input==='file')return `<div class="field"><label>${label}</label><input name="${name}" type="file" accept="application/pdf,.pdf"><small class="hint">Nếu chọn file mới, app sẽ upload PDF này vào Google Drive của bạn.</small></div>`;
  let normalized=val;if(input==='datetime-local'&&val){const d=new Date(val);normalized=isNaN(d)?'':`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}if(input==='date'&&val)normalized=new Date(val).toISOString().slice(0,10);
  const defaults=name==='minutes'&&!val?'value="15" min="1"':name==='dueDay'&&!val?'value="1" min="1" max="31"':name==='percent'?'min="0" max="100" step="1"':name==='color'&&!val?'value="#245647"':'';
  const optional=['terminal','gate','airline','aircraft','seat','distanceKm','fromCode','toCode','bookingRef','checkinUrl','airportTravelMinutes','depTime','arrTime','destination','ticketPrice','driveUrl','birthPlace','currentGpa','currentEnglishScore','otherLanguages','budgetVnd','savingsVnd','passportStatus','applicationDeadline','tuitionAnnual','livingCostAnnual','website','intake','dailyCalorieTarget','preferredName','phone','email','nationality','emergencyContactRelation','passportNumber','passportExpiry','insuranceProvider','insuranceNumber','documentFolderUrl','nextAction','followUpAt','waitingFor','nextFollowUpAt','durationMinutes','steps','label','endAt','withWhom','transport'];
  return `<div class="field"><label>${label}</label><input ${input==='color'||optional.includes(name)?'':'required'} name="${name}" type="${input}" value="${escAttr(normalized)}" ${input==='time'?'step="1"':''} ${defaults}></div>`;
}
function saveForm(event){
  event.preventDefault();
  if(formSaving){toast('Đang lưu, không cần bấm lại.');return}formSaving=true;const saveButton=event.target.querySelector('[type="submit"]');if(saveButton){saveButton.disabled=true;saveButton.textContent='Đang lưu…'}
  const item=Object.fromEntries(new FormData(event.target)); if(editingId)item.id=editingId;
  delete item.cvFile;
  ['dueAt','departure','followUpAt','nextFollowUpAt','startAt','endAt'].forEach(k=>{if(item[k])item[k]=new Date(item[k]).toISOString()});
  if(currentType==='timeLog'){
    const start=new Date(item.startAt),end=new Date(item.endAt);
    if(isNaN(start)||isNaN(end)||end<=start){formSaving=false;if(saveButton){saveButton.disabled=false;saveButton.textContent='Lưu'}toast('Giờ kết thúc phải sau giờ bắt đầu.');return}
    item.durationMinutes=Math.max(1,Math.round((end-start)/60000));
  }
  if(item.date)item.date=new Date(item.date).toISOString();
  if(currentType==='cv'){saveCvForm(event.target,item,saveButton);return}
  const runner=google.script.run.withSuccessHandler(result=>{formSaving=false;if(saveButton){saveButton.disabled=false;saveButton.textContent='Lưu'}formDialog.close();toast(result&&result.calendarWarning?'Đã lưu việc; hãy bấm Calendar để cấp lại quyền Google.':'Đã lưu và đồng bộ');load()}).withFailureHandler(e=>{formSaving=false;if(saveButton){saveButton.disabled=false;saveButton.textContent='Lưu'}fail(e)});
  if(currentType==='profile'){runner.saveProfile(item);return}
  if(currentType==='taskUpdate'){runner.addTaskUpdate(item);return}
  if(currentType==='reflection'){runner.saveReflectionProfile(item);return}
  if(currentType==='studyProfile'){runner.saveStudyAbroadProfile(item);return}
  if(currentType==='appSettings'){runner.saveAppSettings(item);return}
  if(currentType==='healthProfile'){runner.saveHealthProfile(item);return}
  if(currentType==='healthEntry'){runner.logHealthHabit(item);return}
  if(currentType==='weightLog'){runner.logWeight(item);return}
  if(currentType==='routine'){runner.saveRoutineSettings(item);return}
  if(currentType==='balance'){runner.updateWalletBalanceManual(item);return}
  if(currentType==='walletAdjust'){runner.adjustWalletManual(item);return}
  if(currentType==='debtAdjust'){
    const preview=debtAdjustmentPreview(item),verb=item.direction==='decrease'?'Đã trả':item.direction==='increase'?'Tăng nợ':'Đặt lại';
    if(!preview.debt){formSaving=false;if(saveButton){saveButton.disabled=false;saveButton.textContent='Lưu'}toast('Không tìm thấy khoản nợ.');return}
    if(!confirm(`${verb}: ${vnd(preview.amount)}\n\nSố nợ: ${vnd(preview.current)} → ${vnd(preview.next)}\n\nXác nhận cập nhật?`)){formSaving=false;if(saveButton){saveButton.disabled=false;saveButton.textContent='Lưu'}return}
    runner.adjustDebtManual(item);return
  }
  const type={task:'Tasks',timeLog:'TimeLogs',debt:'Debts',meal:'Meals',appointment:'Appointments',flight:'Flights',hotel:'Hotels',wallet:'Wallets',expense:'Expenses',allocation:'Allocations',plan:'Plans',studyOption:'StudyAbroadOptions',studyChecklist:'StudyAbroadChecklist'}[currentType];
  editingId?runner.updateItem(type,item):runner.addItem(type,item);
}
function deleteCurrentFormItem(){if(currentType!=='flight'||!editingId)return;if(!confirmDelete('Xoá chuyến bay này? Thao tác này không thể hoàn tác.'))return;const id=editingId,key=`delete-flight:${id}`,button=$('formDelete');if(!beginAction(key))return;if(button){button.disabled=true;button.textContent='Đang xoá…'}google.script.run.withSuccessHandler(()=>{endAction(key);if(button){button.disabled=false;button.textContent='Xoá chuyến'}formDialog.close();data.flights=(data.flights||[]).filter(f=>f.id!==id);toast('Đã xoá chuyến bay');load()}).withFailureHandler(e=>{endAction(key);if(button){button.disabled=false;button.textContent='Xoá chuyến'}fail(e)}).deleteItem('Flights',id)}
function labelForOption(o){return {expense:'Chi ra',income:'Tiền vào',calorie_in:'Calories nạp vào',calorie_out:'Calories vận động / tiêu hao',work:'Công việc',dead:'Thời gian chết',travel:'Di chuyển',sleep:'Ngủ',play:'Đi chơi',personal:'Cá nhân',walk:'Đi bộ',exercise:'Thể dục',meal:'Ăn uống',custom:'Mục riêng',coffee:'Cà phê',friend:'Đi chơi với bạn',meeting:'Cuộc hẹn / gặp mặt',hometown:'Về quê',decrease:'Giảm số nợ / đã trả',increase:'Tăng số nợ',set:'Đặt số dư nợ mới',todo:'Cần làm',doing:'Đang làm',waiting:'Đang chờ / follow-up',blocked:'Đang kẹt',done:'Đã xong',normal:'Nhắc thường · 2 giờ',urgent:'Bám đuổi · 15 phút',trip:'Chuyến đi',purchase:'Mua sắm lớn',education:'Học tập',health:'Sức khỏe',other:'Khác',high:'Cao',medium:'Vừa',low:'Thấp',sedentary:'Ít vận động',light:'Vận động nhẹ',active:'Đang vận động đều',male:'Nam',female:'Nữ',yes:'Bật',no:'Tắt',domestic:'Nội địa',international:'Quốc tế',scheduled:'Đúng lịch',changed:'Đã đổi giờ',delayed:'Bị delay',cancelled:'Đã huỷ',researching:'Đang tìm hiểu',shortlisted:'Đã vào shortlist',applying:'Đang làm hồ sơ',submitted:'Đã nộp',offer:'Có offer',rejected:'Không được nhận',safe:'An toàn',match:'Phù hợp',reach:'Tham vọng',system:'Theo thiết bị',dark:'Tối',pastel:'Pastel sáng',light:'Sáng',today:'Hôm nay',assistant:'Trợ lý',study:'Du học',money:'Tiền',time:'Thời gian',food:'Sức khỏe',cv:'CV',profile:'Hồ sơ',install:'Cài đặt'}[o]||o}
function beginAction(key){if(pendingActions.has(key)){toast('Đang xử lý — không cần bấm lại.');return false}pendingActions.add(key);return true}
function endAction(key){pendingActions.delete(key)}
function confirmDelete(message){return appSettings().confirmBeforeDelete==='no'||confirm(message)}
function removeItem(type,id){if(!confirmDelete('Xoá mục này? Nếu là giao dịch, số dư và dư nợ liên quan sẽ được hoàn tác.'))return;const key=`delete:${type}:${id}`;if(!beginAction(key))return;let snapshot=null;if(type==='Tasks'){snapshot={task:data.tasks.find(x=>x.id===id),steps:data.tasksteps.filter(x=>x.taskId===id),updates:data.taskupdates.filter(x=>x.taskId===id)};data.tasks=data.tasks.filter(x=>x.id!==id);data.tasksteps=data.tasksteps.filter(x=>x.taskId!==id);data.taskupdates=data.taskupdates.filter(x=>x.taskId!==id);render()}else if(type==='TaskSteps'){snapshot=data.tasksteps.find(x=>x.id===id);data.tasksteps=data.tasksteps.filter(x=>x.id!==id);render()}google.script.run.withSuccessHandler(()=>{endAction(key);toast('Đã xoá');if(type!=='Tasks'&&type!=='TaskSteps')load()}).withFailureHandler(e=>{endAction(key);if(type==='Tasks'&&snapshot?.task){data.tasks.push(snapshot.task);data.tasksteps.push(...snapshot.steps);data.taskupdates.push(...snapshot.updates)}else if(type==='TaskSteps'&&snapshot)data.tasksteps.push(snapshot);render();fail(e)}).deleteItem(type,id)}
function removeWeight(id){if(!confirmDelete('Xoá lần cân này?'))return;google.script.run.withSuccessHandler(msg=>{toast(msg);load()}).withFailureHandler(fail).deleteWeightLog(id)}
function removeWallet(id){if(!confirmDelete('Xoá ví / tài khoản này? Các giao dịch cũ vẫn được giữ nhưng sẽ không còn liên kết với ví.'))return;google.script.run.withSuccessHandler(msg=>{toast(msg);load()}).withFailureHandler(fail).deleteWallet(id)}
function addTaskStepUi(taskId){const title=(prompt('Bước nhỏ tiếp theo là gì? Hãy bắt đầu bằng một động từ:','')||'').trim();if(!title)return;const key=`add-step:${taskId}`;if(!beginAction(key))return;google.script.run.withSuccessHandler(step=>{endAction(key);if(!data.tasksteps.some(x=>x.id===step.id))data.tasksteps.push(step);render();toast('Đã thêm bước nhỏ')}).withFailureHandler(e=>{endAction(key);fail(e)}).addTaskStep(taskId,title)}
function editTaskStepUi(id){const step=data.tasksteps.find(s=>s.id===id);if(!step)return;const title=(prompt('Sửa nội dung bước nhỏ:',step.title)||'').trim();if(!title||title===step.title)return;const key=`edit-step:${id}`;if(!beginAction(key))return;const before=step.title;step.title=title;render();google.script.run.withSuccessHandler(saved=>{endAction(key);step.title=saved.title;render();toast('Đã sửa bước checklist')}).withFailureHandler(e=>{endAction(key);step.title=before;render();fail(e)}).editTaskStep(id,title)}
function toggleTaskStepUi(id){const step=data.tasksteps.find(s=>s.id===id);if(!step)return;const key=`step:${id}`;if(!beginAction(key))return;const before=truth(step.done),desired=!before;step.done=desired;render();google.script.run.withSuccessHandler(result=>{endAction(key);step.done=result.done;if(result.taskId){const task=data.tasks.find(t=>t.id===result.taskId);if(task&&result.nextAction)task.nextAction=result.nextAction}render()}).withFailureHandler(e=>{endAction(key);step.done=before;render();fail(e)}).setTaskStepDone(id,desired)}
function generateChecklistUi(taskId){const key=`generate:${taskId}`;if(!beginAction(key))return;google.script.run.withSuccessHandler(count=>{endAction(key);toast(`Đã tạo ${count} bước nhỏ`);refreshToday(true)}).withFailureHandler(e=>{endAction(key);fail(e)}).generateChecklistForTask(taskId)}
function focusTask(id){const task=data.tasks.find(t=>t.id===id);if(!task)return;const key=`focus:${id}`;if(!beginAction(key))return;const before={status:task.status,startedAt:task.startedAt,lastProgressAt:task.lastProgressAt};task.status='doing';task.startedAt=task.startedAt||new Date().toISOString();task.lastProgressAt=task.lastProgressAt||task.startedAt;render();google.script.run.withSuccessHandler(result=>{endAction(key);task.startedAt=result.startedAt||task.startedAt;if(!activeTimeLog)startTimeLog('work',task.title);else toast('Việc đã chuyển sang Đang làm; bộ đếm hiện tại vẫn tiếp tục.')}).withFailureHandler(e=>{endAction(key);Object.assign(task,before);render();fail(e)}).startTask(id)}
function saveCvForm(form,item,saveButton){
  const file=form.querySelector('input[name="cvFile"]').files[0];
  const reset=()=>{formSaving=false;if(saveButton){saveButton.disabled=false;saveButton.textContent='Lưu'}};
  const done=()=>{reset();formDialog.close();toast('Đã lưu CV');load()};
  const runner=google.script.run.withSuccessHandler(done).withFailureHandler(e=>{reset();fail(e)});
  if(!file){runner.saveCv(item);return}
  if(file.type&&file.type!=='application/pdf'){reset();fail('CV nên là file PDF.');return}
  if(file.size>8*1024*1024){reset();fail('File CV nên dưới 8MB để Apps Script upload ổn định.');return}
  const reader=new FileReader();
  reader.onload=()=>runner.saveCvWithFile(item,{name:file.name,type:file.type||'application/pdf',dataUrl:reader.result});
  reader.onerror=()=>{reset();fail('Không đọc được file CV.')};
  reader.readAsDataURL(file);
}

function enableDeviceNotifications(){
  const ios=/iPad|iPhone|iPod/.test(navigator.userAgent);
  if(ios){toast('Bản Google dùng Calendar để nổ thông báo nền trên iPhone. Đang bật hệ thống nhắc…');enableSmartRemindersUi();return}
  if(!('Notification' in window)){toast('Trình duyệt này chưa hỗ trợ thông báo web. Đang bật Calendar + email thay thế.');enableSmartRemindersUi();return}
  Notification.requestPermission().then(permission=>{
    updateNotificationStatus();
    if(permission==='granted'){
      new Notification('My Assistant đã bật thông báo', {body:'Thông báo thử trên thiết bị này. Email nhắc vẫn là kênh chính.'});
      toast('Đã bật thông báo trên thiết bị này.');
    }else toast('Bạn chưa cấp quyền thông báo.');
  }).catch(fail);
}
function updateNotificationStatus(){
  const el=$('notificationStatus'); if(!el)return;
  if(/iPad|iPhone|iPod/.test(navigator.userAgent)){el.textContent='iPhone: nhắc nền qua Google Calendar + email; không cần tải lại profile khi app cập nhật.';return}
  if(!('Notification' in window)){el.textContent='Thông báo nền đang dùng Google Calendar + email.';return}
  el.textContent='Trạng thái thông báo: '+Notification.permission;
}

function activatePage(page){
  const btn=document.querySelector(`nav button[data-page="${page}"]`);
  const section=$(page);
  if(!btn||!section)return;
  document.querySelectorAll('nav button,.page').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active'); section.classList.add('active');
  if(page!=='today'&&!fullDataLoaded){refreshFullData(page);return}
  renderCurrentPage();
}
function toast(s){$('toast').textContent=s;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',3500)}
function fail(e){toast(e.message||String(e))}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>activatePage(b.dataset.page));
