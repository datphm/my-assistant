<script>
let data={tasks:[],debts:[],meals:[],flights:[],expenses:[]}; let currentType=''; const $=id=>document.getElementById(id); const vnd=n=>new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND',maximumFractionDigits:0}).format(Number(n||0));
function load(){google.script.run.withSuccessHandler(d=>{data=d;render()}).withFailureHandler(fail).getData()};
function render(){const open=data.tasks.filter(t=>!truth(t.done)).sort((a,b)=>new Date(a.dueAt)-new Date(b.dueAt));$('summary').innerHTML=`<small>HÔM NAY</small><b>${open.length?open.length+' việc đang mở':'Không còn việc mở'}</b><span>${open.length?'Chọn một việc nhỏ và bắt đầu.':'Bạn có thể nghỉ một chút.'}</span>`;$('tasks').innerHTML=open.length?open.map(t=>`<article class="card"><div class="card-top"><div><h3>${esc(t.title)}</h3><p class="meta">${new Date(t.dueAt).toLocaleString('vi-VN',{dateStyle:'medium',timeStyle:'short'})} · ${t.minutes||10} phút · ${esc(t.area||'Cá nhân')}</p></div><button class="done" onclick="complete('${t.id}')">✓</button></div></article>`).join(''):'<div class="empty">Chưa có việc nào. Một việc nhỏ là đủ.</div>';const total=data.debts.reduce((s,d)=>s+Number(d.balance||0),0);$('moneySummary').innerHTML=`<small>TỔNG DƯ NỢ</small><b>${vnd(total)}</b><span>Đây là bảng theo dõi, không phải tư vấn tài chính.</span>`;$('debts').innerHTML=data.debts.map(d=>`<article class="card"><h3>${esc(d.name)} <span style="float:right">${vnd(d.balance)}</span></h3><p class="meta">Lãi ${d.annualRate||0}%/năm · tối thiểu ${vnd(d.minimumPayment)} · hạn ngày ${d.dueDay}</p></article>`).join('')||'<div class="empty">Chưa có khoản nợ.</div>';$('meals').innerHTML=data.meals.map(m=>`<article class="card"><h3>${esc(m.title)} <span style="float:right;color:#dc7b3e">${m.calories} kcal</span></h3><p class="meta">${esc(m.ingredients)}${m.notes?' · '+esc(m.notes):''}</p></article>`).join('')||'<div class="empty">Lưu các món bạn thích để khỏi phải nghĩ mỗi ngày.</div>';$('flights').innerHTML=data.flights.map(f=>`<article class="card"><h3>${esc(f.code)} — ${esc(f.destination)}</h3><p class="meta">${new Date(f.departure).toLocaleString('vi-VN',{dateStyle:'medium',timeStyle:'short'})} · ${esc(f.terminal)}</p></article>`).join('')||'<div class="empty">Chưa có chuyến đi.</div>'}
function complete(id){google.script.run.withSuccessHandler(load).withFailureHandler(fail).completeTask(id)};function truth(x){return x===true||x==='TRUE'};function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))};
const fields={task:[['title','Việc cần làm','text'],['dueAt','Nhắc lúc','datetime-local'],['area','Nhóm','select','Công việc,Cá nhân,Sức khỏe,Tiền bạc'],['minutes','Bắt đầu trong (phút)','number']],debt:[['name','Tên khoản nợ','text'],['balance','Số dư','number'],['annualRate','Lãi suất năm (%)','number'],['minimumPayment','Trả tối thiểu','number'],['dueDay','Ngày đến hạn','number']],meal:[['title','Tên món','text'],['calories','Calories','number'],['ingredients','Nguyên liệu','text'],['notes','Ghi chú','text']],flight:[['code','Mã chuyến bay','text'],['destination','Điểm đến','text'],['departure','Khởi hành','datetime-local'],['terminal','Nhà ga','text']]};
function openForm(type){currentType=type;$('formTitle').textContent=({task:'Thêm việc',debt:'Thêm khoản nợ',meal:'Lưu thực đơn',flight:'Thêm chuyến bay'})[type];$('formFields').innerHTML=fields[type].map(([name,label,input,options])=>`<div class="field"><label>${label}</label>${input==='select'?`<select name="${name}">${options.split(',').map(o=>`<option>${o}</option>`).join('')}</select>`:`<input required name="${name}" type="${input}" ${name==='minutes'?'value="15" min="1"':name==='dueDay'?'value="1" min="1" max="31"':''}>`}</div>`).join('');formDialog.showModal()};
function saveForm(event){event.preventDefault();const item=Object.fromEntries(new FormData(event.target));if(item.dueAt||item.departure){const k=item.dueAt?'dueAt':'departure';item[k]=new Date(item[k]).toISOString()}google.script.run.withSuccessHandler(()=>{formDialog.close();toast('Đã lưu');load()}).withFailureHandler(fail).addItem(currentType==='task'?'Tasks':currentType==='debt'?'Debts':currentType==='meal'?'Meals':'Flights',item)}
function importExpenses(){const q=$('gmailQuery').value;google.script.run.withSuccessHandler(r=>{toast(`Đã nhập ${r.count} giao dịch mới`);load()}).withFailureHandler(fail).importExpensesFromGmail(q)}function enableEmails(){google.script.run.withSuccessHandler(toast).withFailureHandler(fail).installReminderTrigger()}function toast(s){$('toast').textContent=s;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',3500)}function fail(e){toast(e.message||String(e))};document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('nav button,.page').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.page).classList.add('active')});load();
</script>
