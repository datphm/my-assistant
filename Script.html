<script>
let data={tasks:[],debts:[],meals:[],flights:[],hotels:[],expenses:[],wallets:[],allocations:[],cvs:[],profile:[]};
let currentType='', editingId='', moneyPeriod='month', flightLimit=20;
const $=id=>document.getElementById(id);
const vnd=n=>new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND',maximumFractionDigits:0}).format(Number(n||0));
const num=n=>new Intl.NumberFormat('vi-VN').format(Number(n||0));
const colors=['#203a66','#245647','#87aa99','#e5b44f','#e55d6f','#5795d0'];
const periodLabels={week:'tuần này',month:'tháng này',year:'năm nay',twoYears:'2 năm gần đây'};

function load(){google.script.run.withSuccessHandler(d=>{data=Object.assign(data,d);render()}).withFailureHandler(fail).getData()}
function render(){
  const open=data.tasks.filter(t=>!truth(t.done)).sort((a,b)=>new Date(a.dueAt)-new Date(b.dueAt));
  $('summary').innerHTML=`<small>HÔM NAY</small><b>${open.length?open.length+' việc đang mở':'Không còn việc mở'}</b><span>${open.length?'Chọn một việc nhỏ và bắt đầu.':'Bạn có thể nghỉ một chút.'}</span>`;
  $('tasks').innerHTML=open.length?open.slice(0,8).map(t=>taskCard(t)).join(''):'<div class="empty">Chưa có việc nào. Một việc nhỏ là đủ.</div>';
  renderKanban();
  renderCurrentPage();
}
function renderCurrentPage(){
  const page=document.querySelector('.page.active')?.id||'today';
  if(page==='profile')renderProfile();
  if(page==='money')renderMoney();
  if(page==='cv')renderCvs();
  if(page==='food')renderMeals();
  if(page==='travel')renderTravel();
  if(page==='install')renderInstall();
}
function taskCard(t){
  return `<article class="card"><div class="card-top"><div><h3>${esc(t.title)}</h3><p class="meta">${dateTime(t.dueAt)} · ${t.minutes||10} phút · ${esc(t.area||'Cá nhân')} ${t.calendarEventId?'· đã lên Calendar':''}</p></div><div class="card-actions"><button class="outline small" onclick="editItem('task','${t.id}')">Sửa</button><button class="outline small" onclick="syncCalendar('${t.id}')">Calendar</button><button class="done" onclick="complete('${t.id}')">✓</button></div></div></article>`;
}
function renderKanban(){
  const now=new Date();
  const open=data.tasks.filter(t=>!truth(t.done)).sort((a,b)=>new Date(a.dueAt)-new Date(b.dueAt));
  const overdue=open.filter(t=>t.dueAt&&new Date(t.dueAt)<=now);
  const upcoming=open.filter(t=>!t.dueAt||new Date(t.dueAt)>now);
  const done=data.tasks.filter(t=>truth(t.done)).slice(-6).reverse();
  const col=(title,items,empty)=>`<section class="kanban-col"><h3>${title}</h3>${items.length?items.slice(0,6).map(t=>`<article class="kanban-card"><b>${esc(t.title)}</b><span>${dateTime(t.dueAt)}</span><div><button onclick="editItem('task','${t.id}')">Sửa</button>${truth(t.done)?'':`<button onclick="complete('${t.id}')">Xong</button>`}</div></article>`).join(''):`<p class="meta">${empty}</p>`}</section>`;
  $('kanban').innerHTML=col('Đang cháy / hôm nay',overdue,'Không có việc quá hạn.')+col('Sắp tới',upcoming,'Chưa có việc sắp tới.')+col('Đã xong',done,'Chưa tick xong việc nào.');
}

function renderProfile(){
  const p=data.profile[0];
  $('profileCard').innerHTML=p?`<article class="card profile-card"><h3>${esc(p.fullName||'Hồ sơ của bạn')}</h3><div class="detail-grid"><span>Ngày sinh</span><b>${p.dateOfBirth?new Date(p.dateOfBirth).toLocaleDateString('vi-VN'):'Chưa lưu'}</b><span>Nhóm máu</span><b>${esc(p.bloodType||'Chưa lưu')}</b><span>Liên hệ khẩn cấp</span><b>${esc(p.emergencyContact||'Chưa lưu')}</b><span>Ghi chú sức khỏe</span><b>${esc(p.medicalNotes||'Chưa lưu')}</b></div><p class="hint">Thông tin này chỉ nằm trong Google Sheet riêng của tài khoản triển khai app.</p></article>`:'<div class="empty">Thêm ngày sinh, nhóm máu và liên hệ khẩn cấp để có sẵn khi cần.</div>';
  $('walletsProfile').innerHTML=walletCards()||'<div class="empty">Thêm ví tiền mặt, tài khoản hoặc thẻ để theo dõi số dư.</div>';
}

function renderMoney(){
  const totalDebt=data.debts.reduce((s,d)=>s+Number(d.balance||0),0);
  const totalBalance=data.wallets.reduce((s,w)=>s+Number(w.balance||0),0);
  const tx=expensesInPeriod();
  const income=tx.filter(e=>e.direction==='income').reduce((s,e)=>s+Number(e.amount||0),0);
  const expense=tx.filter(e=>e.direction!=='income').reduce((s,e)=>s+Number(e.amount||0),0);
  $('moneySummary').innerHTML=`<small>TỔNG SỐ DƯ VÍ / TÀI KHOẢN</small><b>${vnd(totalBalance)}</b><span>${periodLabels[moneyPeriod]}: vào ${vnd(income)} · ra ${vnd(expense)} · ròng ${vnd(income-expense)}. Dư nợ: ${vnd(totalDebt)}.</span>`;
  $('financeInsights').innerHTML=[
    metricCard('Tiền vào',vnd(income),'Ghi có, refund, received'),
    metricCard('Tiền ra',vnd(expense),'Chi tiêu trong '+periodLabels[moneyPeriod]),
    metricCard('Dòng tiền ròng',vnd(income-expense),(income-expense)>=0?'Đang dương':'Đang âm'),
    metricCard('Giao dịch',tx.length+' mục','Gom từ nhập tay + Gmail')
  ].join('');
  $('walletsMoney').innerHTML=walletCards()||'<p class="meta">Chưa có ví hoặc tài khoản.</p>';
  $('gmailWallet').innerHTML='<option value="">Không cập nhật số dư ví</option>'+data.wallets.map(w=>`<option value="${escAttr(w.id)}">${esc(w.name)} · ${vnd(w.balance)}</option>`).join('');
  renderAllocation(tx);
  $('debts').innerHTML=data.debts.map(d=>`<article class="card"><div class="card-top"><div><h3>${esc(d.name)} <span class="amount">${vnd(d.balance)}</span></h3><p class="meta">Lãi ${d.annualRate||0}%/năm · tối thiểu ${vnd(d.minimumPayment)} · hạn ngày ${d.dueDay}</p></div><div class="card-actions"><button class="outline small" onclick="editItem('debt','${d.id}')">Sửa</button><button class="outline small danger" onclick="removeItem('Debts','${d.id}')">Xoá</button></div></div></article>`).join('')||'<div class="empty">Chưa có khoản nợ.</div>';
  const recent=data.expenses.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,12);
  $('expenses').innerHTML=recent.map(e=>`<article class="card"><div class="card-top"><div><h3>${esc(e.merchant)} <span class="amount ${e.direction==='income'?'positive':''}">${e.direction==='income'?'+':'−'}${vnd(e.amount)}</span></h3><p class="meta">${esc(e.category||'Khác')}${e.debtId?' · đã trừ vào khoản nợ':''} · ${dateShort(e.date)} · ${esc(e.source||'Nhập tay')}</p></div><div class="card-actions"><button class="outline small" onclick="editItem('expense','${e.id}')">Sửa</button><button class="outline small danger" onclick="removeItem('Expenses','${e.id}')">Xoá</button></div></div></article>`).join('')||'<div class="empty">Chưa có giao dịch nào.</div>';
}

function expensesInPeriod(){
  const start=periodStart(moneyPeriod);
  return data.expenses.filter(e=>e.date&&new Date(e.date)>=start);
}
function periodStart(p){
  const now=new Date(), d=new Date(now);
  if(p==='week'){d.setDate(now.getDate()-((now.getDay()+6)%7));d.setHours(0,0,0,0);return d}
  if(p==='year'){return new Date(now.getFullYear(),0,1)}
  if(p==='twoYears'){return new Date(now.getFullYear()-2,now.getMonth(),now.getDate())}
  return new Date(now.getFullYear(),now.getMonth(),1);
}
function setMoneyPeriod(p){
  moneyPeriod=p;
  document.querySelectorAll('[data-money-period]').forEach(b=>b.classList.toggle('active',b.dataset.moneyPeriod===p));
  renderMoney();
}
function walletCards(){return data.wallets.map(w=>`<article class="wallet-row"><div><b>${esc(w.name)}</b><span>${esc(w.type||'Ví')} ${w.lastUpdatedAt?'· cập nhật '+dateShort(w.lastUpdatedAt):''}</span></div><strong>${vnd(w.balance)}</strong><div class="wallet-actions"><button class="outline small" onclick="editItem('wallet','${w.id}')">Sửa</button><button class="outline small" onclick="openForm('walletAdjust',{walletId:'${w.id}',direction:'income'})">+ / −</button><button class="outline small danger" onclick="removeItem('Wallets','${w.id}')">Xoá</button></div></article>`).join('')}
function metricCard(label,value,hint){return `<article class="card mini"><small>${esc(label)}</small><b>${esc(value)}</b><span>${esc(hint)}</span></article>`}

function renderAllocation(periodTx){
  const spending=(periodTx||expensesInPeriod()).filter(e=>e.direction!=='income');
  const grouped={}; spending.forEach(e=>grouped[e.category||'Khác']=(grouped[e.category||'Khác']||0)+Number(e.amount||0));
  let entries=Object.entries(grouped); let label='Chi tiêu thực tế '+periodLabels[moneyPeriod];
  if(!entries.length){entries=data.allocations.length?data.allocations.map(a=>[a.name,Number(a.percent)]):[['Thiết yếu',50],['Tiết kiệm / mục tiêu',20],['Nợ',20],['Linh hoạt',10]];label='Tỷ lệ bạn đặt (chưa có giao dịch trong kỳ)'}
  const total=entries.reduce((s,[,n])=>s+n,0)||1;
  let cursor=0; const segments=entries.map(([name,value],i)=>{const start=cursor;const end=cursor+value/total*100;cursor=end;return `${colors[i%colors.length]} ${start}% ${end}%`});
  $('allocationChart').innerHTML=`<div class="chart-wrap"><div class="donut" style="background:conic-gradient(${segments.join(',')})"><div><b>${spending.length?vnd(total):Math.round(total)+'%'}</b><span>${spending.length?'đã chi':'mục tiêu'}</span></div></div><div class="legend"><p class="meta">${label}</p>${entries.map(([name,value],i)=>`<div><i style="background:${colors[i%colors.length]}"></i><span>${esc(name)}</span><b>${spending.length?vnd(value):Math.round(value/total*100)+'%'}</b></div>`).join('')}</div></div>`;
}

function renderCvs(){$('cvs').innerHTML=data.cvs.map(cv=>`<article class="card"><div class="card-top"><div><h3>${esc(cv.title)}</h3><p class="meta">${esc(cv.targetRole||'Chưa chọn vai trò')} · ${esc(cv.fileName||'Bản text')} · cập nhật ${dateShort(cv.updatedAt)}</p></div><button class="outline small" onclick="editCv('${cv.id}')">Cập nhật</button></div>${cv.content?`<p class="cv-preview">${esc(cv.content).slice(0,260)}${cv.content.length>260?'...':''}</p>`:''}${cv.driveUrl&&safeUrl(cv.driveUrl)?`<a class="doc-link" href="${escAttr(cv.driveUrl)}" target="_blank" rel="noopener">Mở file CV trên Google Drive ↗</a>`:''}</article>`).join('')||'<div class="empty">Lưu một CV theo từng vai trò để cập nhật nhanh khi cần.</div>'}
function renderMeals(){$('meals').innerHTML=data.meals.map(m=>`<article class="card"><h3>${esc(m.title)} <span class="amount orange">${m.calories} kcal</span></h3><p class="meta">${esc(m.ingredients)}${m.notes?' · '+esc(m.notes):''}</p></article>`).join('')||'<div class="empty">Lưu các món bạn thích để khỏi phải nghĩ mỗi ngày.</div>'}

function renderTravel(){
  const flights=data.flights.slice().sort((a,b)=>new Date(b.departure)-new Date(a.departure));
  const totalKm=flights.reduce((s,f)=>s+Number(f.distanceKm||0),0);
  const yearKm=flights.filter(f=>new Date(f.departure).getFullYear()===new Date().getFullYear()).reduce((s,f)=>s+Number(f.distanceKm||0),0);
  const topAirline=topBy(flights,f=>f.airline||airlineFromCode(f.code)||'Chưa rõ');
  const topRoute=topBy(flights,f=>`${f.fromCode||'?'}-${f.toCode||f.destination||'?'}`);
  $('travelInsights').innerHTML=[
    metricCard('Tổng chuyến bay',flights.length+' chuyến','Từ PDF + Gmail + nhập tay'),
    metricCard('Tổng dặm',num(Math.round(totalKm*0.621371))+' mi',num(totalKm)+' km'),
    metricCard('Năm nay',num(yearKm)+' km',num(Math.round(yearKm*0.621371))+' mi'),
    metricCard('Top route / hãng',`${esc(topRoute.name)} · ${esc(topAirline.name)}`,`${topRoute.count} lần · ${topAirline.count} lần`)
  ].join('');
  const visibleFlights=flights.slice(0,flightLimit);
  $('flights').innerHTML=visibleFlights.map(f=>`<article class="card"><div class="card-top"><div><h3>${esc(f.code||'Chuyến bay')} — ${esc(routeLabel(f))}</h3><p class="meta">${dateTime(f.departure)} · ${esc(f.airline||'Hãng chưa rõ')} · ${esc(f.aircraft||'Máy bay chưa rõ')} · ${f.distanceKm?num(f.distanceKm)+' km / '+num(Math.round(Number(f.distanceKm)*0.621371))+' mi':'chưa có dặm'}</p>${f.seat||f.note?`<p class="meta">Ghế ${esc(f.seat||'—')} · ${esc(f.note||'')}</p>`:''}</div><button class="outline small" onclick="editItem('flight','${f.id}')">Sửa</button></div></article>`).join('')+(flights.length>flightLimit?`<button class="load-more" onclick="flightLimit+=20;renderTravel()">Xem thêm ${Math.min(20,flights.length-flightLimit)} chuyến</button>`:'')||'<div class="empty">Chưa có chuyến đi.</div>';
  $('hotels').innerHTML=data.hotels.slice().sort((a,b)=>new Date(b.checkIn)-new Date(a.checkIn)).map(h=>`<article class="card"><h3>${esc(h.name||'Khách sạn')}</h3><p class="meta">${esc(h.city||'Chưa rõ thành phố')} · check-in ${dateShort(h.checkIn)}${h.checkOut?' · check-out '+dateShort(h.checkOut):''} ${h.bookingRef?'· mã '+esc(h.bookingRef):''}</p></article>`).join('')||'<div class="empty">Chưa có booking khách sạn. Nhập query Gmail Booking/Agoda/Expedia để thử.</div>';
}
function renderInstall(){
  const ios=$('iosProfileLink'), android=$('androidApkLink');
  if(ios)ios.href=location.origin+location.pathname+'?download=ios-profile';
  if(android)android.href=location.origin+location.pathname+'?download=android-apk';
  updateNotificationStatus();
}
function routeLabel(f){return f.fromCode||f.toCode?`${f.fromCode||'?'} → ${f.toCode||f.destination||'?'}`:(f.destination||'Chưa rõ điểm đến')}
function topBy(list,fn){const m={};list.forEach(x=>{const k=fn(x);m[k]=(m[k]||0)+1});const e=Object.entries(m).sort((a,b)=>b[1]-a[1])[0];return {name:e?e[0]:'—',count:e?e[1]:0}}
function airlineFromCode(code){const m=String(code||'').match(/^[A-Z0-9]{2}/);return m?m[0]:''}

function complete(id){google.script.run.withSuccessHandler(load).withFailureHandler(fail).completeTask(id)}
function createTaskFromMessage(){
  const box=$('taskMessage'); const message=box.value.trim();
  if(!message){toast('Nhập một câu công việc trước đã.');return}
  google.script.run.withSuccessHandler(task=>{box.value='';toast(`Đã tạo việc: ${task.title}`);load()}).withFailureHandler(fail).createTaskFromMessage(message);
}
function truth(x){return x===true||x==='TRUE'}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escAttr(s){return esc(s).replace(/`/g,'&#96;')}
function dateTime(s){return s?new Date(s).toLocaleString('vi-VN',{dateStyle:'medium',timeStyle:'short'}):'Chưa đặt giờ'}
function dateShort(s){return s?new Date(s).toLocaleDateString('vi-VN'):'vừa cập nhật'}
function safeUrl(url){return /^https:\/\//i.test(url||'')}

const fields={
 task:[['title','Việc cần làm','text'],['dueAt','Nhắc lúc','datetime-local'],['area','Nhóm','select','Công việc,Cá nhân,Sức khỏe,Tiền bạc'],['minutes','Bắt đầu trong (phút)','number'],['status','Trạng thái','select','todo,doing,blocked,done']],
 debt:[['name','Tên khoản nợ','text'],['balance','Số dư','number'],['annualRate','Lãi suất năm (%)','number'],['minimumPayment','Trả tối thiểu','number'],['dueDay','Ngày đến hạn','number']],
 meal:[['title','Tên món','text'],['calories','Calories','number'],['ingredients','Nguyên liệu','text'],['notes','Ghi chú','text']],
 flight:[['code','Mã chuyến bay','text'],['destination','Điểm đến / mã sân bay đến','text'],['departure','Khởi hành','datetime-local'],['terminal','Nhà ga','text'],['fromCode','Từ sân bay','text'],['toCode','Đến sân bay','text'],['distanceKm','Khoảng cách km','number'],['depTime','Giờ bay dự kiến','text'],['arrTime','Giờ đến dự kiến','text'],['airline','Hãng bay','text'],['aircraft','Máy bay','text'],['seat','Ghế','text'],['note','Ghi chú delay / thay đổi','textarea']],
 wallet:[['name','Tên ví / tài khoản','text'],['type','Loại','select','Tiền mặt,Tài khoản ngân hàng,Thẻ tín dụng,Tiết kiệm'],['balance','Số dư hiện tại','number']],
 balance:[['walletId','Ví / tài khoản','wallet'],['balance','Số dư mới','number']],
 walletAdjust:[['walletId','Ví / tài khoản','wallet'],['amount','Số tiền điều chỉnh','number'],['direction','Cộng hay trừ','select','income,expense'],['merchant','Ghi chú','text']],
 expense:[['date','Ngày giao dịch','date'],['amount','Số tiền','number'],['direction','Loại','select','expense,income'],['merchant','Nơi chi / ghi chú','text'],['category','Nhóm','select','Ăn uống,Di chuyển,Hóa đơn,Mua sắm,Sức khỏe,Công việc,Trả nợ,Khác'],['walletId','Từ ví / tài khoản','wallet'],['debtId','Khoản nợ được trả (nếu có)','debt']],
 allocation:[['name','Tên mục tiêu','text'],['percent','Tỷ trọng (%)','number'],['color','Màu','color']],
 cv:[['title','Tên CV / phiên bản','text'],['targetRole','Vai trò hướng tới','text'],['content','Nội dung hoặc ghi chú thay đổi','textarea'],['driveUrl','Link Google Drive / Docs (nếu có)','url'],['cvFile','Upload file PDF CV','file']],
 profile:[['fullName','Họ và tên','text'],['dateOfBirth','Ngày sinh','date'],['bloodType','Nhóm máu','select','Chưa rõ,A+,A−,B+,B−,AB+,AB−,O+,O−'],['emergencyContact','Liên hệ khẩn cấp','text'],['medicalNotes','Ghi chú sức khỏe','textarea']]
};

function openProfileForm(){openForm('profile',data.profile[0]||{})}
function editCv(id){openForm('cv',data.cvs.find(cv=>cv.id===id)||{})}
function editItem(kind,id){
  const map={task:['task',data.tasks],flight:['flight',data.flights],expense:['expense',data.expenses],debt:['debt',data.debts],meal:['meal',data.meals],wallet:['wallet',data.wallets]};
  const found=map[kind]?.[1].find(x=>x.id===id);
  if(!found){toast('Không tìm thấy mục để sửa.');return}
  openForm(map[kind][0],found);
}
function openForm(type,item={}){
  currentType=type;editingId=item.id||'';
  const names={task:editingId?'Sửa việc':'Thêm việc',debt:editingId?'Sửa khoản nợ':'Thêm khoản nợ',meal:editingId?'Sửa thực đơn':'Lưu thực đơn',flight:editingId?'Sửa chuyến bay':'Thêm chuyến bay',wallet:editingId?'Sửa ví / tài khoản':'Thêm ví / tài khoản',balance:'Cập nhật số dư',walletAdjust:'Cộng / trừ tiền',expense:editingId?'Sửa giao dịch':'Thêm giao dịch',allocation:'Thiết lập tỷ trọng',cv:editingId?'Cập nhật CV':'Lưu CV',profile:'Cập nhật hồ sơ'};
  $('formTitle').textContent=names[type];
  $('formFields').innerHTML=fields[type].map(([name,label,input,options])=>fieldHtml(name,label,input,options,item[name])).join('');
  formDialog.showModal();
}
function fieldHtml(name,label,input,options,value){
  const val=value===undefined||value===null?'':value;
  if(input==='select'){return `<div class="field"><label>${label}</label><select name="${name}">${options.split(',').map(o=>`<option value="${escAttr(o)}" ${String(o)===String(val)?'selected':''}>${esc(labelForOption(o))}</option>`).join('')}</select></div>`}
  if(input==='wallet'){return `<div class="field"><label>${label}</label><select name="${name}"><option value="">Chưa chọn</option>${data.wallets.map(w=>`<option value="${escAttr(w.id)}" ${w.id===val?'selected':''}>${esc(w.name)}</option>`).join('')}</select></div>`}
  if(input==='debt'){return `<div class="field"><label>${label}</label><select name="${name}"><option value="">Không liên kết khoản nợ</option>${data.debts.map(d=>`<option value="${escAttr(d.id)}" ${d.id===val?'selected':''}>${esc(d.name)} · ${vnd(d.balance)}</option>`).join('')}</select></div>`}
  if(input==='textarea')return `<div class="field"><label>${label}</label><textarea name="${name}">${esc(val)}</textarea></div>`;
  if(input==='file')return `<div class="field"><label>${label}</label><input name="${name}" type="file" accept="application/pdf,.pdf"><small class="hint">Nếu chọn file mới, app sẽ upload PDF này vào Google Drive của bạn.</small></div>`;
  let normalized=val;if(input==='datetime-local'&&val)normalized=new Date(val).toISOString().slice(0,16);if(input==='date'&&val)normalized=new Date(val).toISOString().slice(0,10);
  const defaults=name==='minutes'&&!val?'value="15" min="1"':name==='dueDay'&&!val?'value="1" min="1" max="31"':name==='percent'?'min="0" max="100" step="1"':name==='color'&&!val?'value="#245647"':'';
  return `<div class="field"><label>${label}</label><input ${input==='color'||name==='terminal'||name==='airline'||name==='aircraft'||name==='seat'||name==='distanceKm'||name==='fromCode'||name==='toCode'?'':'required'} name="${name}" type="${input}" value="${escAttr(normalized)}" ${defaults}></div>`;
}
function saveForm(event){
  event.preventDefault();
  const item=Object.fromEntries(new FormData(event.target)); if(editingId)item.id=editingId;
  delete item.cvFile;
  if(item.dueAt||item.departure){const k=item.dueAt?'dueAt':'departure';item[k]=new Date(item[k]).toISOString()}
  if(item.date)item.date=new Date(item.date).toISOString();
  if(currentType==='cv'){saveCvForm(event.target,item);return}
  const runner=google.script.run.withSuccessHandler(()=>{formDialog.close();toast('Đã lưu');load()}).withFailureHandler(fail);
  if(currentType==='profile'){runner.saveProfile(item);return}
  if(currentType==='balance'){runner.updateWalletBalanceManual(item);return}
  if(currentType==='walletAdjust'){runner.adjustWalletManual(item);return}
  const type={task:'Tasks',debt:'Debts',meal:'Meals',flight:'Flights',wallet:'Wallets',expense:'Expenses',allocation:'Allocations'}[currentType];
  editingId?runner.updateItem(type,item):runner.addItem(type,item);
}
function labelForOption(o){return {expense:'Chi ra',income:'Tiền vào',todo:'Cần làm',doing:'Đang làm',blocked:'Đang kẹt',done:'Đã xong'}[o]||o}
function removeItem(type,id){if(!confirm('Xoá mục này? Nếu là giao dịch, số dư và dư nợ liên quan sẽ được hoàn tác.'))return;google.script.run.withSuccessHandler(()=>{toast('Đã xoá');load()}).withFailureHandler(fail).deleteItem(type,id)}
function saveCvForm(form,item){
  const file=form.querySelector('input[name="cvFile"]').files[0];
  const done=()=>{formDialog.close();toast('Đã lưu CV');load()};
  const runner=google.script.run.withSuccessHandler(done).withFailureHandler(fail);
  if(!file){runner.saveCv(item);return}
  if(file.type&&file.type!=='application/pdf'){fail('CV nên là file PDF.');return}
  if(file.size>8*1024*1024){fail('File CV nên dưới 8MB để Apps Script upload ổn định.');return}
  const reader=new FileReader();
  reader.onload=()=>runner.saveCvWithFile(item,{name:file.name,type:file.type||'application/pdf',dataUrl:reader.result});
  reader.onerror=()=>fail('Không đọc được file CV.');
  reader.readAsDataURL(file);
}

function importExpenses(){const q=$('gmailQuery').value;const walletId=$('gmailWallet').value;google.script.run.withSuccessHandler(r=>{toast(`Đã nhập ${r.count} giao dịch${r.balanceUpdates?` · cập nhật ${r.balanceUpdates} số dư`:''}`);load()}).withFailureHandler(fail).importExpensesFromGmail(q,walletId)}
function enableBankSync(){const q=$('gmailQuery').value;const walletId=$('gmailWallet').value;google.script.run.withSuccessHandler(toast).withFailureHandler(fail).installBankSync(q,walletId)}
function disableBankSync(){google.script.run.withSuccessHandler(toast).withFailureHandler(fail).uninstallBankSync()}
function importTravel(){const q=$('travelQuery').value;google.script.run.withSuccessHandler(r=>{toast(`Đã nhập ${r.flights} chuyến bay · ${r.hotels} khách sạn`);load()}).withFailureHandler(fail).importTravelFromGmail(q)}
function enableTravelSync(){const q=$('travelQuery').value;google.script.run.withSuccessHandler(toast).withFailureHandler(fail).installTravelSync(q)}
function disableTravelSync(){google.script.run.withSuccessHandler(toast).withFailureHandler(fail).uninstallTravelSync()}
function enableEmails(){google.script.run.withSuccessHandler(toast).withFailureHandler(fail).installReminderTrigger()}
function disableEmails(){google.script.run.withSuccessHandler(toast).withFailureHandler(fail).uninstallReminderTrigger()}
function syncCalendar(id){google.script.run.withSuccessHandler(msg=>{toast(msg);load()}).withFailureHandler(fail).syncTaskToCalendar(id)}
function enableDeviceNotifications(){
  if(!('Notification' in window)){toast('Thiết bị/trình duyệt này chưa hỗ trợ thông báo web. Dùng email nhắc sẽ ổn hơn.');updateNotificationStatus();return}
  Notification.requestPermission().then(permission=>{
    updateNotificationStatus();
    if(permission==='granted'){
      new Notification('My Assistant đã bật thông báo', {body:'Thông báo thử trên thiết bị này. Email nhắc vẫn là kênh chính.'});
      toast('Đã bật thông báo trên thiết bị này.');
    }else toast('Bạn chưa cấp quyền thông báo.');
  }).catch(fail);
}
function updateNotificationStatus(){
  const el=$('notificationStatus'); if(!el)return;
  if(!('Notification' in window)){el.textContent='Trình duyệt này không hỗ trợ Notification API.';return}
  el.textContent='Trạng thái thông báo: '+Notification.permission;
}
function copyAppLink(){
  const link=location.origin+location.pathname;
  navigator.clipboard?.writeText(link).then(()=>toast('Đã copy link app')).catch(()=>toast(link));
}
function activatePage(page){
  const btn=document.querySelector(`nav button[data-page="${page}"]`);
  const section=$(page);
  if(!btn||!section)return;
  document.querySelectorAll('nav button,.page').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active'); section.classList.add('active');
  renderCurrentPage();
}
function toast(s){$('toast').textContent=s;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',3500)}
function fail(e){toast(e.message||String(e))}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>activatePage(b.dataset.page));
if(location.hash.replace('#','')) setTimeout(()=>activatePage(location.hash.replace('#','')),0);
load();
</script>
