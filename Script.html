<script>
let data={tasks:[],debts:[],meals:[],healthprofile:[],weightlogs:[],flights:[],hotels:[],expenses:[],wallets:[],allocations:[],cvs:[],reflectionprofile:[],dailyguidance:{},profile:[],timelogs:[],timestate:[],routinesettings:[],plans:[],notifications:[]};
let currentType='', editingId='', moneyPeriod='month', flightLimit=20;
let activeTimeLog=JSON.parse(localStorage.getItem('my-assistant-active-time-v1')||'null');
const $=id=>document.getElementById(id);
const vnd=n=>new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND',maximumFractionDigits:0}).format(Number(n||0));
const num=n=>new Intl.NumberFormat('vi-VN').format(Number(n||0));
const colors=['#203a66','#245647','#87aa99','#e5b44f','#e55d6f','#5795d0'];
const periodLabels={week:'tuần này',month:'tháng này',year:'năm nay',twoYears:'2 năm gần đây'};

function load(){google.script.run.withSuccessHandler(d=>{data=Object.assign(data,d);const serverActive=(data.timestate||[])[0];activeTimeLog=serverActive?{kind:serverActive.kind,label:serverActive.label,startAt:serverActive.startAt}:null;if(activeTimeLog)localStorage.setItem('my-assistant-active-time-v1',JSON.stringify(activeTimeLog));else localStorage.removeItem('my-assistant-active-time-v1');render()}).withFailureHandler(fail).getData()}
function render(){
  const open=data.tasks.filter(t=>!truth(t.done)).sort((a,b)=>new Date(a.dueAt)-new Date(b.dueAt));
  $('summary').innerHTML=`<small>HÔM NAY</small><b>${open.length?open.length+' việc đang mở':'Không còn việc mở'}</b><span>${open.length?'Chọn một việc nhỏ và bắt đầu.':'Bạn có thể nghỉ một chút.'}</span>`;
  $('tasks').innerHTML=open.length?open.slice(0,8).map(t=>taskCard(t)).join(''):'<div class="empty">Chưa có việc nào. Một việc nhỏ là đủ.</div>';
  renderKanban();
  renderNotifications();
  renderTimeAnchor();
  renderCurrentPage();
}
function renderCurrentPage(){
  const page=document.querySelector('.page.active')?.id||'today';
  if(page==='profile')renderProfile();
  if(page==='money')renderMoney();
  if(page==='cv')renderCvs();
  if(page==='food')renderHealth();
  if(page==='travel')renderTravel();
  if(page==='time')renderTime();
  if(page==='install')renderInstall();
}
function taskCard(t){
  return `<article class="card ${t.chaseMode==='urgent'?'chasing':''}"><div class="card-top"><div><h3>${t.chaseMode==='urgent'?'🚨 ':''}${esc(t.title)}</h3><p class="meta">${dateTime(t.dueAt)} · ${t.minutes||10} phút · ${esc(t.area||'Cá nhân')} ${t.calendarEventId?'· Calendar + 4 noti':''}${t.startedAt?' · đã bắt đầu':''}</p></div><div class="card-actions"><button class="outline small" onclick="editItem('task','${t.id}')">Sửa</button><button class="outline small" onclick="syncCalendar('${t.id}')">Calendar</button><button class="outline small ${t.chaseMode==='urgent'?'danger':''}" onclick="toggleChase('${t.id}')">${t.chaseMode==='urgent'?'Tắt bám':'Bám đuổi'}</button>${t.startedAt?'':`<button class="outline small" onclick="startTask('${t.id}')">Đã bắt đầu</button>`}<button class="done" onclick="complete('${t.id}')">✓</button></div></div></article>`;
}
function renderTimeAnchor(){
  const now=new Date(); const clock=$('currentClock'); if(clock)clock.textContent=now.toLocaleTimeString('vi-VN');
  const next=data.tasks.filter(t=>!truth(t.done)&&t.dueAt).sort((a,b)=>new Date(a.dueAt)-new Date(b.dueAt))[0];
  const countdown=$('nextTaskClock'), title=$('nextTaskTitle'); if(!countdown||!title)return;
  if(!next){countdown.textContent='Chưa có deadline';title.textContent='';return}
  const ms=new Date(next.dueAt)-now; const past=ms<0; const total=Math.abs(ms); const hours=Math.floor(total/3600000); const mins=Math.floor(total%3600000/60000); const secs=Math.floor(total%60000/1000);
  countdown.textContent=past?`Quá ${hours}h ${mins}m ${secs}s`:`Còn ${hours}h ${mins}m ${secs}s`; title.textContent=next.title;
}
setInterval(()=>{renderTimeAnchor();renderActiveTime()},1000);
setInterval(syncActiveTimeLog,15000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)syncActiveTimeLog()});

function syncActiveTimeLog(){
  google.script.run.withSuccessHandler(server=>{
    const before=activeTimeLog&&String(activeTimeLog.startAt),after=server&&String(server.startAt);
    if(before===after)return;
    activeTimeLog=server?{kind:server.kind,label:server.label,startAt:server.startAt}:null;
    if(activeTimeLog)localStorage.setItem('my-assistant-active-time-v1',JSON.stringify(activeTimeLog));else localStorage.removeItem('my-assistant-active-time-v1');
    if(before&&!after){load();return}renderActiveTime();
  }).withFailureHandler(()=>{}).getActiveTimeLog();
}

function startTimeLog(kind,label){
  if(activeTimeLog){toast('Hãy dừng mục đang chạy trước.');return}
  google.script.run.withSuccessHandler(active=>{activeTimeLog=active;localStorage.setItem('my-assistant-active-time-v1',JSON.stringify(active));renderTime();toast('Đã bắt đầu · tập trung vào đúng việc này')}).withFailureHandler(fail).beginTimeLog(kind,label);
}
function startCustomTimeLog(){const input=$('customTimeLabel'),label=input.value.trim();if(!label){toast('Nhập tên hoạt động trước.');return}startTimeLog('custom',label);input.value=''}
function stopTimeLog(){
  if(!activeTimeLog)return;
  google.script.run.withSuccessHandler(result=>{activeTimeLog=null;localStorage.removeItem('my-assistant-active-time-v1');toast(`Đã lưu ${result.durationMinutes} phút`);load()}).withFailureHandler(fail).finishTimeLog();
}
function renderActiveTime(){
  const label=$('activeTimeLabel'),clock=$('activeTimeClock'),button=$('stopTimeButton');if(!label||!clock||!button)return;
  if(!activeTimeLog){label.textContent='Chưa bắt đầu';clock.textContent='00:00:00';button.disabled=true;return}
  const seconds=Math.max(0,Math.floor((Date.now()-new Date(activeTimeLog.startAt))/1000)),h=String(Math.floor(seconds/3600)).padStart(2,'0'),m=String(Math.floor(seconds%3600/60)).padStart(2,'0'),s=String(seconds%60).padStart(2,'0');label.textContent=activeTimeLog.label;clock.textContent=`${h}:${m}:${s}`;button.disabled=false;
}
function renderTime(){
  const picker=$('timeDate');if(!picker)return;if(!picker.value)picker.value=new Date().toISOString().slice(0,10);renderActiveTime();
  const selected=picker.value,logs=(data.timelogs||[]).filter(log=>log.startAt&&new Date(log.startAt).toLocaleDateString('en-CA')===selected).sort((a,b)=>new Date(b.startAt)-new Date(a.startAt));
  const total=logs.reduce((sum,log)=>sum+Number(log.durationMinutes||0),0),groups={};logs.forEach(log=>{const key=log.label||log.kind||'Khác';groups[key]=(groups[key]||0)+Number(log.durationMinutes||0)});
  const top=Object.entries(groups).sort((a,b)=>b[1]-a[1]);$('timeStats').innerHTML=[metricCard('Đã log',`${Math.floor(total/60)}h ${total%60}m`,`${logs.length} hoạt động`),...top.slice(0,3).map(([name,minutes])=>metricCard(name,`${Math.floor(minutes/60)}h ${minutes%60}m`,total?`${Math.round(minutes/total*100)}% trong ngày`:'0%'))].join('');
  $('timeEntries').innerHTML=logs.map(log=>`<article class="card"><div class="card-top"><div><h3>${esc(log.label||log.kind||'Hoạt động')}</h3><p class="meta">${new Date(log.startAt).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})} → ${new Date(log.endAt).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})} · ${log.durationMinutes||0} phút</p></div><button class="outline small danger" onclick="removeItem('TimeLogs','${log.id}')">Xoá</button></div></article>`).join('')||'<div class="empty">Chưa log thời gian trong ngày này.</div>';
  renderRoutine();
}

function renderRoutine(){
  const r=(data.routinesettings||[])[0]||{};const el=$('routineSummary');if(!el)return;
  el.innerHTML=`<span>🍳 Ăn sáng <b>${esc(clockValue(r.breakfastTime,'08:00:00'))}</b></span><span>🍱 Ăn trưa <b>${esc(clockValue(r.lunchTime,'12:30:00'))}</b></span><span>🍲 Ăn tối <b>${esc(clockValue(r.dinnerTime,'19:00:00'))}</b></span><span>🌙 Đi ngủ <b>${esc(clockValue(r.bedtime,'23:30:00'))}</b></span><span>☀️ Thức dậy <b>${esc(clockValue(r.wakeTime,'07:30:00'))}</b></span><span>⏱ Hỏi log mỗi <b>${esc(r.logIntervalMinutes||60)} phút</b></span>`;
  if($('sleepLatency'))$('sleepLatency').value=r.sleepLatencyMinutes||15;
}
function clockValue(value,fallback){
  const raw=String(value||'');if(/^\d{1,2}:\d{2}(:\d{2})?$/.test(raw)){const p=raw.split(':');return `${p[0].padStart(2,'0')}:${p[1]}:${p[2]||'00'}`}
  const date=new Date(raw);return isNaN(date)?fallback:date.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
function openRoutineForm(){openForm('routine',(data.routinesettings||[])[0]||{})}
function installRoutineCalendarUi(){google.script.run.withSuccessHandler(toast).withFailureHandler(fail).installRoutineCalendar()}
function calculateSleepWindow(){
  const value=$('sleepStart').value||'23:30',latency=Number($('sleepLatency').value||15),parts=value.split(':').map(Number),start=new Date();start.setHours(parts[0],parts[1],0,0);if(start<Date.now()-3600000)start.setDate(start.getDate()+1);
  const wake=cycles=>new Date(start.getTime()+(latency+cycles*90)*60000).toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
  const routine=(data.routinesettings||[])[0]||{},target=routine.wakeTime||'07:30';
  $('sleepSuggestions').innerHTML=`<div><b>${wake(5)}</b><span>5 chu kỳ · khoảng 7 giờ 30 phút</span></div><div class="best"><b>${wake(6)}</b><span>6 chu kỳ · khoảng 9 giờ</span></div><p class="hint">Nếu phải dậy lúc ${esc(target)}, hãy ưu tiên đủ ít nhất 7 giờ ngủ. Đây là ước tính, không phải chẩn đoán y khoa.</p>`;
}
function renderKanban(){
  const now=new Date();
  const open=data.tasks.filter(t=>!truth(t.done)).sort((a,b)=>new Date(a.dueAt)-new Date(b.dueAt));
  const overdue=open.filter(t=>t.dueAt&&new Date(t.dueAt)<=now);
  const upcoming=open.filter(t=>!t.dueAt||new Date(t.dueAt)>now);
  const done=data.tasks.filter(t=>truth(t.done)).slice(-6).reverse();
  const col=(title,items,empty)=>`<section class="kanban-col"><h3>${title}</h3>${items.length?items.slice(0,6).map(t=>`<article class="kanban-card"><b>${esc(t.title)}</b><span>${dateTime(t.dueAt)}</span><div><button onclick="editItem('task','${t.id}')">Sửa</button>${truth(t.done)?'':`<button onclick="complete('${t.id}')">Xong</button>`}</div></article>`).join(''):`<p class="meta">${empty}</p>`}</section>`;
  $('kanban').innerHTML=col('Đang cháy / hôm nay',overdue,'Không có việc quá hạn.')+col('Sắp tới',upcoming,'Chưa có việc sắp tới.')+col('Đã xong',done,'Chưa tick xong việc nào.');
}

function renderNotifications(){
  const box=$('notificationCenter');if(!box)return;
  const unread=(data.notifications||[]).filter(n=>{
    if(n.readAt)return false;
    if(n.targetType==='task'){const task=data.tasks.find(t=>t.id===n.targetId);return task&&!truth(task.done)&&task.status!=='done'}
    if(n.targetType==='flight'){const flight=data.flights.find(f=>f.id===n.targetId);return flight&&flight.status!=='cancelled'&&new Date(flight.departure)>new Date()}
    return true;
  }).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const seen=new Set();
  const visible=unread.filter(n=>{const key=`${n.type}:${n.targetId}`;if(seen.has(key))return false;seen.add(key);return true}).slice(0,5);
  if(!visible.length){box.innerHTML='';box.hidden=true;return}
  box.hidden=false;
  box.innerHTML=`<div class="notification-head"><div><span class="pill">TRỢ LÝ ĐANG BÁM VIỆC</span><h2>${visible.length} mục cần chú ý</h2></div></div><div class="notification-list">${visible.map(n=>`<article class="notice ${escAttr(n.priority||'normal')}"><button class="notice-main" onclick="openNotificationTarget('${escAttr(n.targetType)}','${escAttr(n.targetId)}')"><b>${esc(n.title)}</b><span>${esc(n.message)}</span><small>${dateTime(n.createdAt)}</small></button><button class="notice-done" onclick="readNotification('${escAttr(n.id)}')" aria-label="Đánh dấu đã đọc">✓</button></article>`).join('')}</div>`;
}
function readNotification(id){google.script.run.withSuccessHandler(load).withFailureHandler(fail).markNotificationRead(id)}
function openNotificationTarget(type,id){
  if(type==='flight'){activatePage('travel');setTimeout(()=>$('upcomingFlightPlan')?.scrollIntoView({behavior:'smooth'}),50);return}
  if(type==='health'){activatePage('food');setTimeout(()=>$('workoutSuggestions')?.scrollIntoView({behavior:'smooth'}),50);return}
  if(type==='career'){activatePage('cv');setTimeout(()=>$('dailyGuidance')?.scrollIntoView({behavior:'smooth'}),50);return}
  activatePage('today');
  setTimeout(()=>document.querySelector(`[onclick="editItem('task','${id}')"]`)?.closest('.card')?.scrollIntoView({behavior:'smooth',block:'center'}),50);
}

function renderProfile(){
  const p=data.profile[0];
  $('profileCard').innerHTML=p?`<article class="card profile-card"><h3>${esc(p.fullName||'Hồ sơ của bạn')}</h3><div class="detail-grid"><span>Ngày sinh</span><b>${p.dateOfBirth?new Date(p.dateOfBirth).toLocaleDateString('vi-VN'):'Chưa lưu'}</b><span>Nhóm máu</span><b>${esc(p.bloodType||'Chưa lưu')}</b><span>Liên hệ khẩn cấp</span><b>${esc(p.emergencyContact||'Chưa lưu')}</b><span>Ghi chú sức khỏe</span><b>${esc(p.medicalNotes||'Chưa lưu')}</b></div><p class="hint">Thông tin này chỉ nằm trong Google Sheet riêng của tài khoản triển khai app.</p></article>`:'<div class="empty">Thêm ngày sinh, nhóm máu và liên hệ khẩn cấp để có sẵn khi cần.</div>';
  $('walletsProfile').innerHTML=walletCards()||'<div class="empty">Thêm ví tiền mặt, tài khoản hoặc thẻ để theo dõi số dư.</div>';
}

function renderMoney(){
  const totalDebt=data.debts.reduce((s,d)=>s+Number(d.balance||0),0);
  const totalBalance=data.wallets.reduce((s,w)=>s+Number(w.balance||0),0);
  const tx=expensesInPeriod();
  const income=tx.filter(e=>e.direction==='income').reduce((s,e)=>s+Number(e.amount||0),0);
  const expense=tx.filter(e=>e.direction!=='income').reduce((s,e)=>s+Number(e.amount||0),0);
  $('moneySummary').innerHTML=`<small>TỔNG SỐ DƯ VÍ / TÀI KHOẢN</small><b>${vnd(totalBalance)}</b><span>${periodLabels[moneyPeriod]}: vào ${vnd(income)} · ra ${vnd(expense)} · ròng ${vnd(income-expense)}. Dư nợ: ${vnd(totalDebt)}.</span>`;
  $('financeInsights').innerHTML=[
    metricCard('Tiền vào',vnd(income),'Ghi có, refund, received'),
    metricCard('Tiền ra',vnd(expense),'Chi tiêu trong '+periodLabels[moneyPeriod]),
    metricCard('Dòng tiền ròng',vnd(income-expense),(income-expense)>=0?'Đang dương':'Đang âm'),
    metricCard('Giao dịch',tx.length+' mục','Gom từ nhập tay + Gmail')
  ].join('');
  $('walletsMoney').innerHTML=walletCards()||'<p class="meta">Chưa có ví hoặc tài khoản.</p>';
  $('gmailWallet').innerHTML='<option value="">Không cập nhật số dư ví</option>'+data.wallets.map(w=>`<option value="${escAttr(w.id)}">${esc(w.name)} · ${vnd(w.balance)}</option>`).join('');
  renderAllocation(tx);
  $('debts').innerHTML=data.debts.map(d=>`<article class="card"><div class="card-top"><div><h3>${esc(d.name)} <span class="amount">${vnd(d.balance)}</span></h3><p class="meta">Lãi ${d.annualRate||0}%/năm · tối thiểu ${vnd(d.minimumPayment)} · hạn ngày ${d.dueDay}</p></div><div class="card-actions"><button class="outline small" onclick="editItem('debt','${d.id}')">Sửa</button><button class="outline small danger" onclick="removeItem('Debts','${d.id}')">Xoá</button></div></div></article>`).join('')||'<div class="empty">Chưa có khoản nợ.</div>';
  const recent=data.expenses.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,12);
  $('expenses').innerHTML=recent.map(e=>`<article class="card"><div class="card-top"><div><h3>${esc(e.merchant)} <span class="amount ${e.direction==='income'?'positive':''}">${e.direction==='income'?'+':'−'}${vnd(e.amount)}</span></h3><p class="meta">${esc(e.category||'Khác')}${e.debtId?' · đã trừ vào khoản nợ':''} · ${dateShort(e.date)} · ${esc(e.source||'Nhập tay')}</p></div><div class="card-actions"><button class="outline small" onclick="editItem('expense','${e.id}')">Sửa</button><button class="outline small danger" onclick="removeItem('Expenses','${e.id}')">Xoá</button></div></div></article>`).join('')||'<div class="empty">Chưa có giao dịch nào.</div>';
  renderPlans(totalBalance,totalDebt);
}

function renderPlans(totalBalance,totalDebt){
  const plans=data.plans||[],cutoff=new Date(Date.now()-90*86400000),recent=data.expenses.filter(e=>e.date&&new Date(e.date)>=cutoff),income=recent.filter(e=>e.direction==='income').reduce((s,e)=>s+Number(e.amount||0),0),out=recent.filter(e=>e.direction!=='income').reduce((s,e)=>s+Number(e.amount||0),0),monthlyNet=(income-out)/3;
  const coach=$('moneyCoach'),list=$('plans');if(!coach||!list)return;
  const available=Math.max(0,totalBalance-totalDebt);
  coach.innerHTML=`<article class="card"><h3>Gợi ý ưu tiên tiền lúc này</h3><p class="meta">Sau khi trừ dư nợ khỏi số dư hiện có: <b>${vnd(available)}</b>. Dòng tiền ròng bình quân 90 ngày: <b>${vnd(monthlyNet)}/tháng</b>.</p><p class="hint">Giữ một khoản dự phòng phù hợp với rủi ro thực tế của bạn trước khi cam kết khoản chi lớn; số tiền phù hợp phụ thuộc hoàn cảnh.</p></article>`;
  list.innerHTML=plans.map(p=>{const remain=Math.max(0,Number(p.estimatedCost||0)-Number(p.savedAmount||0)),days=Math.max(1,Math.ceil((new Date(p.targetDate)-Date.now())/86400000)),months=Math.max(1,days/30.4),need=remain/months,ratio=monthlyNet>0?Math.round(need/monthlyNet*100):null,warning=remain===0?'Đã đủ tiền dành sẵn.':monthlyNet<=0?'Dòng tiền 90 ngày đang không dương: nên giảm chi phí, dời ngày hoặc tăng tiền dành sẵn.':need>monthlyNet?'Mức cần dành vượt dòng tiền ròng gần đây: nên dời ngày hoặc giảm ngân sách.':`Cần dành khoảng ${vnd(need)}/tháng${ratio!==null?` · ${ratio}% dòng tiền ròng`:''}.`;return `<article class="card"><div class="card-top"><div><h3>${esc(p.name)}</h3><p class="meta">${labelForOption(p.type)} · cần ${vnd(p.estimatedCost)} · đã có ${vnd(p.savedAmount)} · hạn ${dateShort(p.targetDate)}</p><p class="hint">${warning}</p></div><div class="card-actions"><button class="outline small" onclick="editItem('plan','${p.id}')">Sửa</button><button class="outline small danger" onclick="removeItem('Plans','${p.id}')">Xoá</button></div></div></article>`}).join('')||'<div class="empty">Thêm chuyến đi hoặc khoản mua lớn để app tính số tiền cần dành mỗi tháng.</div>';
}

function expensesInPeriod(){
  const start=periodStart(moneyPeriod);
  return data.expenses.filter(e=>e.date&&new Date(e.date)>=start);
}
function periodStart(p){
  const now=new Date(), d=new Date(now);
  if(p==='week'){d.setDate(now.getDate()-((now.getDay()+6)%7));d.setHours(0,0,0,0);return d}
  if(p==='year'){return new Date(now.getFullYear(),0,1)}
  if(p==='twoYears'){return new Date(now.getFullYear()-2,now.getMonth(),now.getDate())}
  return new Date(now.getFullYear(),now.getMonth(),1);
}
function setMoneyPeriod(p){
  moneyPeriod=p;
  document.querySelectorAll('[data-money-period]').forEach(b=>b.classList.toggle('active',b.dataset.moneyPeriod===p));
  renderMoney();
}
function walletCards(){return data.wallets.map(w=>`<article class="wallet-row"><div><b>${esc(w.name)}</b><span>${esc(w.type||'Ví')} ${w.lastUpdatedAt?'· cập nhật '+dateShort(w.lastUpdatedAt):''}</span></div><strong>${vnd(w.balance)}</strong><div class="wallet-actions"><button class="outline small" onclick="editItem('wallet','${w.id}')">Sửa</button><button class="outline small" onclick="openForm('walletAdjust',{walletId:'${w.id}',direction:'income'})">+ / − tiền</button><button class="outline small danger" onclick="removeWallet('${w.id}')">Xoá ví</button></div></article>`).join('')}
function metricCard(label,value,hint){return `<article class="card mini"><small>${esc(label)}</small><b>${esc(value)}</b><span>${esc(hint)}</span></article>`}

function renderAllocation(periodTx){
  const spending=(periodTx||expensesInPeriod()).filter(e=>e.direction!=='income');
  const grouped={}; spending.forEach(e=>grouped[e.category||'Khác']=(grouped[e.category||'Khác']||0)+Number(e.amount||0));
  let entries=Object.entries(grouped); let label='Chi tiêu thực tế '+periodLabels[moneyPeriod];
  if(!entries.length){entries=data.allocations.length?data.allocations.map(a=>[a.name,Number(a.percent)]):[['Thiết yếu',50],['Tiết kiệm / mục tiêu',20],['Nợ',20],['Linh hoạt',10]];label='Tỷ lệ bạn đặt (chưa có giao dịch trong kỳ)'}
  const total=entries.reduce((s,[,n])=>s+n,0)||1;
  let cursor=0; const segments=entries.map(([name,value],i)=>{const start=cursor;const end=cursor+value/total*100;cursor=end;return `${colors[i%colors.length]} ${start}% ${end}%`});

  const map={task:['task',data.tasks],flight:['flight',data.flights],hotel:['hotel',data.hotels],expense:['expense',data.expenses],debt:['debt',data.debts],meal:['meal',data.meals],wallet:['wallet',data.wallets],plan:['plan',data.plans]};

function openForm(type,item={}){
  currentType=type;editingId=item.id||'';
  const names={task:editingId?'Sửa việc':'Thêm việc',debt:editingId?'Sửa khoản nợ':'Thêm khoản nợ',meal:editingId?'Sửa thực đơn':'Lưu thực đơn',healthProfile:'Mục tiêu sức khỏe',weightLog:'Ghi cân nặng',flight:editingId?'Sửa chuyến bay':'Thêm chuyến bay',hotel:editingId?'Sửa khách sạn':'Thêm khách sạn',wallet:editingId?'Sửa ví / tài khoản':'Thêm ví / tài khoản',balance:'Cập nhật số dư',walletAdjust:'Cộng / trừ tiền',expense:editingId?'Sửa giao dịch':'Thêm giao dịch',allocation:'Thiết lập tỷ trọng',cv:editingId?'Cập nhật CV':'Lưu CV',reflection:'Định hướng & chiêm nghiệm',profile:'Cập nhật hồ sơ',routine:'Lịch sinh hoạt & nhắc log',plan:editingId?'Sửa kế hoạch lớn':'Thêm kế hoạch lớn'};
  $('formTitle').textContent=names[type];
  $('formFields').innerHTML=fields[type].map(([name,label,input,options])=>fieldHtml(name,label,input,options,item[name])).join('');
  formDialog.showModal();
}
function fieldHtml(name,label,input,options,value){
  const val=value===undefined||value===null?'':value;
  if(input==='select'){return `<div class="field"><label>${label}</label><select name="${name}">${options.split(',').map(o=>`<option value="${escAttr(o)}" ${String(o)===String(val)?'selected':''}>${esc(labelForOption(o))}</option>`).join('')}</select></div>`}
  if(input==='wallet'){return `<div class="field"><label>${label}</label><select name="${name}"><option value="">Chưa chọn</option>${data.wallets.map(w=>`<option value="${escAttr(w.id)}" ${w.id===val?'selected':''}>${esc(w.name)}</option>`).join('')}</select></div>`}
  if(input==='debt'){return `<div class="field"><label>${label}</label><select name="${name}"><option value="">Không liên kết khoản nợ</option>${data.debts.map(d=>`<option value="${escAttr(d.id)}" ${d.id===val?'selected':''}>${esc(d.name)} · ${vnd(d.balance)}</option>`).join('')}</select></div>`}
  if(input==='textarea')return `<div class="field"><label>${label}</label><textarea name="${name}">${esc(val)}</textarea></div>`;
  if(input==='file')return `<div class="field"><label>${label}</label><input name="${name}" type="file" accept="application/pdf,.pdf"><small class="hint">Nếu chọn file mới, app sẽ upload PDF này vào Google Drive của bạn.</small></div>`;
  let normalized=val;if(input==='datetime-local'&&val)normalized=new Date(val).toISOString().slice(0,16);if(input==='date'&&val)normalized=new Date(val).toISOString().slice(0,10);
  const defaults=name==='minutes'&&!val?'value="15" min="1"':name==='dueDay'&&!val?'value="1" min="1" max="31"':name==='percent'?'min="0" max="100" step="1"':name==='color'&&!val?'value="#245647"':'';
  const optional=['terminal','airline','aircraft','seat','distanceKm','fromCode','toCode','bookingRef','checkinUrl','airportTravelMinutes','depTime','arrTime','destination','ticketPrice','driveUrl','birthPlace'];
  return `<div class="field"><label>${label}</label><input ${input==='color'||optional.includes(name)?'':'required'} name="${name}" type="${input}" value="${escAttr(normalized)}" ${input==='time'?'step="1"':''} ${defaults}></div>`;
}
function saveForm(event){
  event.preventDefault();
  const item=Object.fromEntries(new FormData(event.target)); if(editingId)item.id=editingId;
  delete item.cvFile;
  if(item.dueAt||item.departure){const k=item.dueAt?'dueAt':'departure';item[k]=new Date(item[k]).toISOString()}
  if(item.date)item.date=new Date(item.date).toISOString();
  if(currentType==='cv'){saveCvForm(event.target,item);return}
  const runner=google.script.run.withSuccessHandler(result=>{formDialog.close();toast(result&&result.calendarWarning?'Đã lưu việc; hãy bấm Calendar để cấp lại quyền Google.':'Đã lưu và đồng bộ');load()}).withFailureHandler(fail);
  if(currentType==='profile'){runner.saveProfile(item);return}
  if(currentType==='reflection'){runner.saveReflectionProfile(item);return}
  if(currentType==='healthProfile'){runner.saveHealthProfile(item);return}
  if(currentType==='weightLog'){runner.logWeight(item);return}
  if(currentType==='routine'){runner.saveRoutineSettings(item);return}
  if(currentType==='balance'){runner.updateWalletBalanceManual(item);return}
  if(currentType==='walletAdjust'){runner.adjustWalletManual(item);return}
  const type={task:'Tasks',debt:'Debts',meal:'Meals',flight:'Flights',hotel:'Hotels',wallet:'Wallets',expense:'Expenses',allocation:'Allocations',plan:'Plans'}[currentType];
  editingId?runner.updateItem(type,item):runner.addItem(type,item);
}
function labelForOption(o){return {expense:'Chi ra',income:'Tiền vào',todo:'Cần làm',doing:'Đang làm',blocked:'Đang kẹt',done:'Đã xong',normal:'Nhắc thường · 2 giờ',urgent:'Bám đuổi · 15 phút',trip:'Chuyến đi',purchase:'Mua sắm lớn',education:'Học tập',health:'Sức khỏe',other:'Khác',high:'Cao',medium:'Vừa',low:'Thấp',sedentary:'Ít vận động',light:'Vận động nhẹ',active:'Đang vận động đều',male:'Nam',female:'Nữ',yes:'Bật',no:'Tắt',domestic:'Nội địa',international:'Quốc tế',scheduled:'Đúng lịch',changed:'Đã đổi giờ',delayed:'Bị delay',cancelled:'Đã huỷ'}[o]||o}

function removeWeight(id){if(!confirm('Xoá lần cân này?'))return;google.script.run.withSuccessHandler(msg=>{toast(msg);load()}).withFailureHandler(fail).deleteWeightLog(id)}
function removeWallet(id){if(!confirm('Xoá ví / tài khoản này? Các giao dịch cũ vẫn được giữ nhưng sẽ không còn liên kết với ví.'))return;google.script.run.withSuccessHandler(msg=>{toast(msg);load()}).withFailureHandler(fail).deleteWallet(id)}
function saveCvForm(form,item){
  const file=form.querySelector('input[name="cvFile"]').files[0];
  const done=()=>{formDialog.close();toast('Đã lưu CV');load()};
  const runner=google.script.run.withSuccessHandler(done).withFailureHandler(fail);
  if(!file){runner.saveCv(item);return}
  if(file.type&&file.type!=='application/pdf'){fail('CV nên là file PDF.');return}
  if(file.size>8*1024*1024){fail('File CV nên dưới 8MB để Apps Script upload ổn định.');return}
  const reader=new FileReader();
  reader.onload=()=>runner.saveCvWithFile(item,{name:file.name,type:file.type||'application/pdf',dataUrl:reader.result});
  reader.onerror=()=>fail('Không đọc được file CV.');
  reader.readAsDataURL(file);
}

function enableDeviceNotifications(){
  const ios=/iPad|iPhone|iPod/.test(navigator.userAgent);
  if(ios){toast('Bản Google dùng Calendar để nổ thông báo nền trên iPhone. Đang bật hệ thống nhắc…');enableSmartRemindersUi();return}
  if(!('Notification' in window)){toast('Trình duyệt này chưa hỗ trợ thông báo web. Đang bật Calendar + email thay thế.');enableSmartRemindersUi();return}
  Notification.requestPermission().then(permission=>{
    updateNotificationStatus();
    if(permission==='granted'){
      new Notification('My Assistant đã bật thông báo', {body:'Thông báo thử trên thiết bị này. Email nhắc vẫn là kênh chính.'});
      toast('Đã bật thông báo trên thiết bị này.');
    }else toast('Bạn chưa cấp quyền thông báo.');
  }).catch(fail);
}
function updateNotificationStatus(){
  const el=$('notificationStatus'); if(!el)return;
  if(/iPad|iPhone|iPod/.test(navigator.userAgent)){el.textContent='iPhone: nhắc nền qua Google Calendar + email; không cần tải lại profile khi app cập nhật.';return}
  if(!('Notification' in window)){el.textContent='Thông báo nền đang dùng Google Calendar + email.';return}
  el.textContent='Trạng thái thông báo: '+Notification.permission;
}
function copyAppLink(){
  const link=location.origin+location.pathname;
  navigator.clipboard?.writeText(link).then(()=>toast('Đã copy link app')).catch(()=>toast(link));
}
function exportAllDataFile(){
  google.script.run.withSuccessHandler(payload=>{const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='my-assistant-google-data.json';a.click();toast('Đã xuất dữ liệu JSON.');}).withFailureHandler(fail).exportAllData();
}
function activatePage(page){
  const btn=document.querySelector(`nav button[data-page="${page}"]`);
  const section=$(page);
  if(!btn||!section)return;
  document.querySelectorAll('nav button,.page').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active'); section.classList.add('active');
  renderCurrentPage();
}
function toast(s){$('toast').textContent=s;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',3500)}
function fail(e){toast(e.message||String(e))}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>activatePage(b.dataset.page));
if(location.hash.replace('#','')) setTimeout(()=>activatePage(location.hash.replace('#','')),0);
load();
